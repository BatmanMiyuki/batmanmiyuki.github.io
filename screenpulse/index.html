<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ── Helpers ───────────────────────────────────────────────────────────────────
const toKey  = d => { const l = new Date(d - d.getTimezoneOffset()*60000); return l.toISOString().slice(0,10); };
const today  = () => new Date();
const sow    = d => { const r=new Date(d); r.setDate(r.getDate()-((r.getDay()+6)%7)); r.setHours(0,0,0,0); return r; };
const addD   = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const fmtH   = h => { let hh=Math.floor(h); let mm=Math.round((h-hh)*60); if(mm===60){hh++;mm=0;} return mm?`${hh}h${String(mm).padStart(2,'0')}`:`${hh}h`; };
const fmtDate= d => d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
const fmtS   = d => d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
const fmtY   = d => d.getFullYear();

const COLORS  = ['#ff453a','#ffd60a','#30d158','#4d96ff','#c77dff','#ff9f0a','#00cec9','#fd79a8','#a29bfe','#55efc4'];
const PRESETS = ['TikTok','Instagram','YouTube','Netflix','Snapchat','Twitter/X','WhatsApp','Spotify','Chrome','Safari','Discord','Twitch','Reddit','Pinterest','LinkedIn'];

const THEMES = [
  { id:'default',  label:'Noir',     desc:'Cinématique, fond pur',   preview:['#000000','#4d96ff','#30d158'] },
  { id:'midnight', label:'Midnight', desc:'Bleu profond doux',       preview:['#04050a','#7db4ff','#30d158'] },
  { id:'amoled',   label:'AMOLED',   desc:'Noir absolu, yeux reposés',preview:['#000000','#4d96ff','#ffffff'] },
  { id:'slate',    label:'Slate',    desc:'Ardoise équilibrée',      preview:['#0a0b0f','#60a5fa','#30d158'] },
  { id:'light',    label:'Light',    desc:'Mode clair',              preview:['#fbfbfd','#2563eb','#16a34a'] },
];

const ACCENTS = [
  { id:'default', label:'Bleu',    color:'#4d96ff' },
  { id:'purple',  label:'Violet',  color:'#a855f7' },
  { id:'green',   label:'Vert',    color:'#30d158' },
  { id:'orange',  label:'Orange',  color:'#ff9f0a' },
  { id:'pink',    label:'Rose',    color:'#ec4899' },
  { id:'cyan',    label:'Cyan',    color:'#06b6d4' },
  { id:'gold',    label:'Or',      color:'#eab308' },
];

const GOAL_OPTIONS = [1,2,3,4,5,6,7,8,10,12];

// ── Storage multi-couche (localStorage → cookie → window.name) ────────────────
const WN_KEY = '__sp_wn__';

const _wnGet = (k) => {
  try {
    const o = window.name && window.name.startsWith(WN_KEY)
      ? JSON.parse(window.name.slice(WN_KEY.length))
      : {};
    return k in o ? o[k] : undefined;
  } catch { return undefined; }
};
const _wnSet = (k, v) => {
  try {
    const o = window.name && window.name.startsWith(WN_KEY)
      ? JSON.parse(window.name.slice(WN_KEY.length))
      : {};
    o[k] = v;
    window.name = WN_KEY + JSON.stringify(o);
  } catch {}
};

const _cookieSet = (k, v) => {
  try {
    const enc = encodeURIComponent(v);
    if (enc.length > 3800) return;
    document.cookie = `${k}=${enc};path=/;max-age=31536000;SameSite=Lax`;
  } catch {}
};
const _cookieGet = (k) => {
  try {
    const m = document.cookie.match(new RegExp('(?:^|; )' + k + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : undefined;
  } catch { return undefined; }
};

const load = (k, d) => {
  try {
    const v = localStorage.getItem(k);
    if (v !== null) return JSON.parse(v);
  } catch {}
  try {
    const v = _wnGet(k);
    if (v !== undefined) return v;
  } catch {}
  try {
    const v = _cookieGet(k);
    if (v !== undefined) return JSON.parse(v);
  } catch {}
  return d;
};

const save = (k, v) => {
  const s = JSON.stringify(v);
  try { localStorage.setItem(k, s); } catch {}
  try { _wnSet(k, v); } catch {}
  try { _cookieSet(k, s); } catch {}
};

const _lsWorks = (() => {
  try {
    localStorage.setItem('__sp_test__','1');
    const ok = localStorage.getItem('__sp_test__') === '1';
    localStorage.removeItem('__sp_test__');
    return ok;
  } catch { return false; }
})();

// ── AppIcon ───────────────────────────────────────────────────────────────────
function AppIcon({ name, color, size=16, appImages={} }) {
  const img = appImages[name];
  if (img) return (
    <span style={{width:size,height:size,borderRadius:size*0.3,overflow:'hidden',flexShrink:0,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <img src={img} alt={name} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:size*0.3}}/>
    </span>
  );
  return <span style={{width:size,height:size,borderRadius:'50%',background:color,flexShrink:0,display:'inline-block'}}/>;
}

// ── Reveal-on-scroll wrapper ──────────────────────────────────────────────────
function Reveal({ children, style, delay=0, as='div' }) {
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((es)=>{
      es.forEach(e=>{ if(e.isIntersecting){ el.classList.add('in'); io.disconnect(); } });
    },{threshold:0.12});
    io.observe(el);
    return ()=>io.disconnect();
  },[]);
  const Tag = as;
  return <Tag ref={ref} className="reveal" style={{transitionDelay:`${delay}ms`,...style}}>{children}</Tag>;
}

// ── Minimal starfield (subtle, cinematic) ─────────────────────────────────────
function Starfield() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, raf;
    const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const stars = Array.from({ length: 70 }, () => ({
      x: Math.random(), y: Math.random(), r: Math.random()*1.1+0.15,
      base: 0.05 + Math.random()*0.35, spd: 0.3+Math.random()*0.9, phase: Math.random()*Math.PI*2,
    }));
    let last=0;
    const draw=(ts)=>{
      raf=requestAnimationFrame(draw);
      ctx.clearRect(0,0,W,H);
      const t=ts*0.001;
      stars.forEach(s=>{
        const alpha=Math.max(0.02,s.base+Math.sin(t*s.spd+s.phase)*0.22);
        ctx.beginPath();
        ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.fill();
      });
    };
    raf=requestAnimationFrame(draw);
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  }, []);
  return <canvas ref={canvasRef} style={{position:'fixed',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0,opacity:0.6}}/>;
}

// ── SVG Charts (cinematic) ────────────────────────────────────────────────────
function BarChart({ data, todayKey }) {
  const W=340,H=170,PL=30,PB=24,PT=16,PR=8;
  const iW=W-PL-PR, iH=H-PB-PT;
  const maxV=Math.max(...data.map(d=>d.h),0.5);
  const barW=Math.max(Math.floor(iW/data.length*0.5),4);
  const gap=iW/data.length;
  const ticks=[0,Math.ceil(maxV/2),Math.ceil(maxV)];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
      {ticks.map(v=>{
        const y=PT+iH-(v/maxV)*iH;
        return <g key={v}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
          <text x={PL-4} y={y+4} textAnchor="end" fill="var(--text-muted)" fontSize="9" fontFamily="Space Mono,monospace">{v>0?`${v}h`:''}</text>
        </g>;
      })}
      {data.map((d,i)=>{
        const bH=Math.max((d.h/maxV)*iH, d.h>0?3:0);
        const x=PL+gap*i+gap/2-barW/2;
        const y=PT+iH-bH;
        const isToday=d.key===todayKey;
        return <g key={i}>
          <defs>
            <linearGradient id={`barg-${i}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={isToday?'var(--accent)':'#ffffff'}/>
              <stop offset="100%" stopColor={isToday?'var(--accent)':'#ffffff'} stopOpacity="0.25"/>
            </linearGradient>
          </defs>
          <rect x={x} y={y} width={barW} height={bH} rx="5" fill={`url(#barg-${i})`} fillOpacity={isToday?1:0.85}/>
          <text x={PL+gap*i+gap/2} y={H-7} textAnchor="middle" fill={isToday?'var(--accent)':'var(--text-faint)'} fontSize="9.5" fontWeight="600" fontFamily="Space Mono,monospace">{d.name}</text>
          {d.h>0&&<text x={PL+gap*i+gap/2} y={y-5} textAnchor="middle" fill="var(--text-primary)" fontSize="8.5" fontFamily="Space Mono,monospace">{fmtH(d.h)}</text>}
        </g>;
      })}
    </svg>
  );
}

function LineChart({ data }) {
  if (data.length<2) return null;
  const W=340,H=130,PL=30,PB=18,PT=10,PR=8;
  const iW=W-PL-PR, iH=H-PB-PT;
  const maxV=Math.max(...data.map(d=>d.total),0.5);
  const pts=data.map((d,i)=>[PL+(i/(data.length-1))*iW, PT+iH-(d.total/maxV)*iH]);
  const path=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  const area=`M${pts[0][0]},${PT+iH} ${pts.map(p=>`L${p[0]},${p[1]}`).join(' ')} L${pts[pts.length-1][0]},${PT+iH} Z`;
  const ticks=[0,Math.ceil(maxV/2),Math.ceil(maxV)];
  const step=Math.ceil(data.length/6);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></linearGradient></defs>
      {ticks.map(v=>{
        const y=PT+iH-(v/maxV)*iH;
        return <g key={v}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
          <text x={PL-4} y={y+4} textAnchor="end" fill="var(--text-muted)" fontSize="9" fontFamily="Space Mono,monospace">{v>0?`${v}h`:''}</text>
        </g>;
      })}
      <path d={area} fill="url(#lg)"/>
      <path d={path} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i)=>{
        if(i%step!==0&&i!==data.length-1) return null;
        return <text key={i} x={pts[i][0]} y={H-3} textAnchor="middle" fill="var(--text-muted)" fontSize="8" fontFamily="Space Mono,monospace">{d.key.slice(5)}</text>;
      })}
    </svg>
  );
}

function DonutChart({ data }) {
  if (!data.length) return null;
  const CX=110,CY=95,R=78,IR=50;
  const total=data.reduce((a,d)=>a+d.v,0);
  let angle=-Math.PI/2;
  const slices=data.slice(0,8).map((d,i)=>{
    const sw=(d.v/total)*2*Math.PI;
    const a1=angle,a2=angle+sw; angle=a2;
    const x1=CX+R*Math.cos(a1),y1=CY+R*Math.sin(a1);
    const x2=CX+R*Math.cos(a2),y2=CY+R*Math.sin(a2);
    const ix1=CX+IR*Math.cos(a2),iy1=CY+IR*Math.sin(a2);
    const ix2=CX+IR*Math.cos(a1),iy2=CY+IR*Math.sin(a1);
    const lg=sw>Math.PI?1:0;
    return {path:`M${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${ix1},${iy1} A${IR},${IR} 0 ${lg} 0 ${ix2},${iy2} Z`,color:COLORS[i%10]};
  });
  return (
    <svg viewBox="0 0 220 190" style={{width:'100%',maxWidth:220,display:'block',margin:'0 auto'}}>
      {slices.map((sl,i)=><path key={i} d={sl.path} fill={sl.color} fillOpacity="0.9" stroke="var(--bg-root)" strokeWidth="2"/>)}
      <text x={CX} y={CY-5} textAnchor="middle" fill="var(--text-primary)" fontSize="20" fontWeight="700" fontFamily="Space Mono,monospace">{data.length}</text>
      <text x={CX} y={CY+13} textAnchor="middle" fill="var(--text-muted)" fontSize="10" fontFamily="-apple-system,sans-serif">applications</text>
    </svg>
  );
}

// ── Install Banner ────────────────────────────────────────────────────────────
function InstallBanner() {

    const h=e=>{e.preventDefault();setPrompt(e);};

  if(!prompt) return null;
  return (
    <div style={{position:'fixed',bottom:16,left:16,right:16,zIndex:200,background:'var(--bg-modal)',border:'1px solid var(--accent)',borderRadius:18,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,boxShadow:`0 8px 40px var(--accent-glow)`}}>

      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--text-primary)'}}>Installer ScreenPulse</div>
        <div style={{fontSize:11,color:'var(--text-muted)'}}>Ajouter à l'écran d'accueil</div>
      </div>
      <button onClick={()=>{prompt.prompt();setPrompt(null);}} style={{padding:'8px 16px',borderRadius:999,border:'none',background:'var(--accent)',color:'#000',fontWeight:700,fontSize:12,cursor:'pointer'}}>Installer</button>

  );
}

// ── Export modal ──────────────────────────────────────────────────────────────
function showExportModal(txt) {
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(10px)';
  overlay.innerHTML=`
    <div style="background:var(--bg-modal,#0a0a0c);border:1px solid var(--border-modal,rgba(255,255,255,.12));border-radius:24px;padding:22px;width:100%;max-width:500px;max-height:82vh;display:flex;flex-direction:column;gap:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#fff;font-weight:700;font-size:16px;font-family:-apple-system,sans-serif;letter-spacing:-.3px">📋 Tes données</span>
        <button id="sp-close" style="background:none;border:none;color:#86868b;font-size:22px;cursor:pointer;line-height:1">✕</button>
      </div>
      <textarea id="sp-export-txt" readonly style="flex:1;min-height:300px;background:#000;border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;font-family:'Space Mono',monospace;font-size:11px;padding:14px;resize:none;outline:none;line-height:1.6"></textarea>
      <button id="sp-copy" style="padding:14px;border-radius:999px;border:none;background:#4d96ff;color:#000;font-weight:700;font-size:14px;cursor:pointer;font-family:-apple-system,sans-serif">📋 Copier tout</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('sp-export-txt').value = txt;
  document.getElementById('sp-close').onclick = () => overlay.remove();
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.getElementById('sp-copy').onclick = () => {
    const ta = document.getElementById('sp-export-txt');
    ta.select();ta.setSelectionRange(0, 99999);
    let copied = false;
    try { copied = document.execCommand('copy'); } catch(e) {}
    if (!copied && navigator.clipboard) { navigator.clipboard.writeText(txt).catch(()=>{}); copied = true; }
    const btn = document.getElementById('sp-copy');
    if (btn) { btn.textContent = '✅ Copié !'; setTimeout(()=>{ if(btn) btn.textContent='📋 Copier tout'; }, 2000); }
  };
}

      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:500,color:'var(--text-primary)'}}>{label}</div>
        {desc&&<div style={{fontSize:12,color:'var(--text-muted)',marginTop:3}}>{desc}</div>}
      </div>
      <div

      >

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [data,setData]             = useState(()=>load('st_data',{}));
  const [week,setWeek]             = useState(()=>sow(today()));
  const [view,setView]             = useState('week');
  const [modal,setModal]           = useState(null);
  const [inputH,setInputH]         = useState('');
  const [inputM,setInputM]         = useState('');
  const [selApp,setSelApp]         = useState('');
  const [custApp,setCustApp]       = useState('');
  const [appH,setAppH]             = useState('');
  const [appM,setAppM]             = useState('');
  const [showAll,setShowAll]       = useState(false);
  const [focusedApp,setFocusedApp] = useState(null);
  const [appPickerOpen,setAppPickerOpen] = useState(false);
  const [appPickerSearch,setAppPickerSearch] = useState('');
  const [appFadeKey,setAppFadeKey] = useState(0);
  const [searchApp,setSearchApp]   = useState('');
  const [range,setRange]           = useState(null);
  const [rFrom,setRFrom]           = useState('');
  const [rTo,setRTo]               = useState('');
  const [showPicker,setShowPicker] = useState(false);
  const [calcRows,setCalcRows]     = useState([{h:'',m:'',label:''}]);
  const [calcDate,setCalcDate]     = useState(()=>toKey(today()));
  const [publishDone,setPublishDone] = useState(false);
  const [adjustModal,setAdjustModal] = useState(false);
  const [adjH,setAdjH]               = useState('');
  const [adjM,setAdjM]               = useState('');
  const [myApps,setMyApps]         = useState(()=>load('my_apps',[]));
  const [newAppName,setNewAppName] = useState('');
  const [newAppIcon,setNewAppIcon] = useState('📱');
  const [appImages,setAppImages]   = useState(()=>load('app_images',{}));
  const [imgSearch,setImgSearch]   = useState('');

  // ── Settings state
  const [theme,setThemeState]      = useState(()=>load('sp_theme','default'));
  const [accentColor,setAccentColor] = useState(()=>load('sp_accent','default'));
  const [fontSize,setFontSize]     = useState(()=>load('sp_fontsize','medium'));
  const [dailyGoal,setDailyGoal]   = useState(()=>load('sp_goal',4));
  const [showGoalBar,setShowGoalBar] = useState(()=>load('sp_showgoal',true));
  const [compactCards,setCompactCards] = useState(()=>load('sp_compact',false));
  const [weekStartMon,setWeekStartMon] = useState(()=>load('sp_weekmon',true));
  const [confirmDelete,setConfirmDelete] = useState(()=>load('sp_confirmdelete',true));
  const [importText,setImportText] = useState('');
  const [importStatus,setImportStatus] = useState(null);
  const [resetConfirm,setResetConfirm] = useState(false);
  const [resetDone,setResetDone]   = useState(false);
  const storageOk = _lsWorks;

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', theme==='default'?'':theme);
    save('sp_theme',theme);
  },[theme]);
  useEffect(()=>{
    document.documentElement.setAttribute('data-accent', accentColor==='default'?'':accentColor);
    save('sp_accent',accentColor);
  },[accentColor]);
  useEffect(()=>{
    document.documentElement.setAttribute('data-font', fontSize);
    save('sp_fontsize',fontSize);
  },[fontSize]);
  useEffect(()=>{ save('sp_goal',dailyGoal); },[dailyGoal]);
  useEffect(()=>{ save('sp_showgoal',showGoalBar); },[showGoalBar]);
  useEffect(()=>{ save('sp_compact',compactCards); },[compactCards]);
  useEffect(()=>{ save('sp_weekmon',weekStartMon); },[weekStartMon]);
  useEffect(()=>{ save('sp_confirmdelete',confirmDelete); },[confirmDelete]);

  useEffect(()=>{ save('st_data',data); },[data]);
  useEffect(()=>{ save('my_apps',myApps); },[myApps]);
  useEffect(()=>{ try{ localStorage.setItem('app_images',JSON.stringify(appImages)); }catch{} },[appImages]);

  const setTheme = (t) => setThemeState(t);

  const allApps = useMemo(()=>[...myApps.map(a=>a.name), ...PRESETS.filter(p=>!myApps.find(a=>a.name===p))],[myApps]);

  const addMyApp = ()=>{
    const name=newAppName.trim();
    if(!name||myApps.find(a=>a.name===name)) return;
    setMyApps(p=>[{name,icon:newAppIcon},...p]);
    setNewAppName('');setNewAppIcon('📱');
  };
  const delMyApp = name=>setMyApps(p=>p.filter(a=>a.name!==name));

  const uploadImage=(appName,file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=128;
        const ratio=Math.min(MAX/img.width, MAX/img.height, 1);
        const canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        const compressed=canvas.toDataURL('image/jpeg',0.7);
        setAppImages(p=>{
          const next={...p,[appName]:compressed};
          try{ localStorage.setItem('app_images',JSON.stringify(next)); }
          catch(err){
            const sorted=Object.entries(next).sort((a,b)=>b[1].length-a[1].length);
            const trimmed=Object.fromEntries(sorted.slice(1));
            trimmed[appName]=compressed;
            localStorage.setItem('app_images',JSON.stringify(trimmed));
            return trimmed;
          }
          return next;
        });
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  const delImage=appName=>setAppImages(p=>{const n={...p};delete n[appName];return n;});

  // ── Calculator
  const calcTotal = useMemo(()=>calcRows.reduce((acc,r)=>{
    const h=(parseFloat(r.h)||0)+(parseFloat(r.m)||0)/60; return acc+h;
  },0),[calcRows]);
  const updRow=(i,field,val)=>setCalcRows(p=>p.map((r,j)=>j===i?{...r,[field]:val}:r));
  const addRow=()=>setCalcRows(p=>[...p,{h:'',m:'',label:''}]);
  const delRow=i=>setCalcRows(p=>p.length===1?p:p.filter((_,j)=>j!==i));
  const resetCalc=()=>{ setCalcRows([{h:'',m:'',label:''}]); setPublishDone(false); };

  const doAdjust=(plus)=>{
    const h=(parseFloat(adjH)||0)+(parseFloat(adjM)||0)/60;
    if(h<=0) return;
    setData(prev=>{
      const old=prev[calcDate]||{total:0,apps:{}};
      return {...prev,[calcDate]:{...old,total:Math.max(0,old.total+(plus?h:-h))}};
    });
    setAdjH('');setAdjM('');setAdjustModal(false);
  };

  const publishCalc=()=>{
    if(calcTotal<=0) return;
    const allKnown=[...myApps.map(a=>a.name),...PRESETS];
    const canonicalize=label=>{
      const low=label.trim().toLowerCase();
      const match=allKnown.find(a=>a.toLowerCase()===low);
      return match||label.trim();
    };
    setData(prev=>{
      const old=prev[calcDate]||{total:0,apps:{}};
      const newApps={...old.apps};
      calcRows.forEach(r=>{
        const h=(parseFloat(r.h)||0)+(parseFloat(r.m)||0)/60;
        if(r.label.trim()&&h>0){
          const canonical=canonicalize(r.label);
          newApps[canonical]=h;
        }
      });
      return {...prev,[calcDate]:{total:calcTotal,apps:newApps}};
    });
    setPublishDone(true);
  };

  const todayKey = toKey(today());
  const days = useMemo(()=>Array.from({length:7},(_,i)=>addD(week,i)),[week]);
  const weekData = days.map(d=>{
    const k=toKey(d),e=data[k]||{total:0,apps:{}};
    return {date:d,key:k,total:e.total,apps:e.apps||{}};
  });
  const avgW = useMemo(()=>{
    const f=weekData.filter(d=>d.total>0);
    return f.length?f.reduce((a,d)=>a+d.total,0)/f.length:0;
  },[weekData]);

  const stats = useMemo(()=>{
    const entries=range
      ?Object.entries(data).filter(([k])=>k>=range.from&&k<=range.to)
      :Object.entries(data);
    const appT={};
    entries.forEach(([,v])=>Object.entries(v.apps||{}).forEach(([app,h])=>{ appT[app]=(appT[app]||0)+h; }));
    const sorted=Object.entries(appT).sort((a,b)=>b[1]-a[1]);
    const totalH=sorted.reduce((a,[,h])=>a+h,0);
    const daily=entries
      .filter(([,v])=>v.total>0)
      .map(([k,v])=>({key:k,total:v.total}))
      .sort((a,b)=>a.key.localeCompare(b.key));
    const avgH=daily.length>0?daily.reduce((a,d)=>a+d.total,0)/daily.length:0;
    return {totalH,avgH,sorted,daily,days:daily.length};
  },[data,range]);

  const appStats = useMemo(()=>{
    if (!focusedApp) return null;
    const days = Object.entries(data)
      .map(([k,v])=>({ key:k, h:(v.apps||{})[focusedApp]||0 }))
      .filter(d=>d.h>0)
      .sort((a,b)=>b.h-a.h);
    const total = days.reduce((acc,d)=>acc+d.h, 0);
    const top10 = days.slice(0,10);
    const avgH  = days.length ? total/days.length : 0;
    const best  = top10[0] || null;
    return { total, avgH, days: days.length, top10, best };
  }, [focusedApp, data]);

  const allKnownApps = useMemo(()=>{
    const fromData = new Set();
    Object.values(data).forEach(v=>Object.keys(v.apps||{}).forEach(a=>fromData.add(a)));
    return [...fromData].sort((a,b)=>a.localeCompare(b,'fr'));
  }, [data]);

  const records = useMemo(()=>{
    const allEntries=Object.entries(data).filter(([,v])=>v.total>0);
    if(!allEntries.length) return null;
    const sorted=[...allEntries].sort((a,b)=>b[1].total-a[1].total);
    const bestDay=sorted[0];
    const worstDay=sorted[sorted.length-1];
    const currentWeekKey = toKey(sow(today()));
    const weekMap={};
    allEntries.forEach(([k,v])=>{
      const d=new Date(k+'T00:00:00');
      const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk=toKey(mon);
      if(wk===currentWeekKey) return;
      weekMap[wk]=(weekMap[wk]||0)+v.total;
    });
    const weekEntries=Object.entries(weekMap).sort((a,b)=>b[1]-a[1]);
    if(weekEntries.length<1) return {bestDay,worstDay,bestWeek:null,worstWeek:null,topAppEntry:null};
    const bestWeek=weekEntries[0];
    const worstWeek=weekEntries[weekEntries.length-1];
    let topDayApp=null;
    Object.entries(data).forEach(([k,v])=>{
      Object.entries(v.apps||{}).forEach(([app,h])=>{
        if(!topDayApp||h>topDayApp.h) topDayApp={app,h,date:k};
      });
    });
    return {bestDay,worstDay,bestWeek,worstWeek,topDayApp};
  },[data]);

  const openAdd = d=>{setModal({date:d,mode:'add'});setInputH('');setInputM('');};
  const openApp = d=>{setModal({date:d,mode:'app'});setSelApp('');setCustApp('');setAppH('');setAppM('');};

  const doTime = plus=>{
    const h=(parseFloat(inputH)||0)+(parseFloat(inputM)||0)/60;
    if(h<=0) return;
    const k=toKey(modal.date);
    setData(p=>{const o=p[k]||{total:0,apps:{}}; return {...p,[k]:{...o,total:Math.max(0,o.total+(plus?h:-h))}}; });
    setModal(null);
  };
  const doApp = ()=>{
    const app=selApp==='_c'?custApp.trim():selApp;
    if(!app) return;
    const h=(parseFloat(appH)||0)+(parseFloat(appM)||0)/60;
    if(h<=0) return;
    const k=toKey(modal.date);
    setData(p=>{const o=p[k]||{total:0,apps:{}}; const apps={...o.apps,[app]:(o.apps[app]||0)+h}; return {...p,[k]:{...o,apps}}; });
    setModal(null);
  };
  const delApp=(dk,app)=>setData(p=>{const o=p[dk]||{total:0,apps:{}}; const apps={...o.apps}; delete apps[app]; return {...p,[dk]:{...o,apps}}; });

  const quickRange=(d,yr)=>{
    const t=today(),toS=toKey(t),frS=yr?`${t.getFullYear()}-01-01`:toKey(addD(t,-d+1));
    setRFrom(frS);setRTo(toS);setRange({from:frS,to:toS});setShowPicker(false);
  };

  const rangeLabel=range
    ?`${range.from.slice(8)}.${range.from.slice(5,7)}.${range.from.slice(0,4)} → ${range.to.slice(8)}.${range.to.slice(5,7)}.${range.to.slice(0,4)}`
    :'Depuis toujours';

  // ── Export
  const buildExportText = () => {
    const lines=['📊 Export ScreenPulse — ' + new Date().toLocaleDateString('fr-FR'),''];
    lines.push('=== CLASSEMENT DES APPLICATIONS ===');
    stats.sorted.forEach(([app,h],i)=>{ lines.push(`#${i+1} ${app} : ${fmtH(h)}`); });
    lines.push('');
    lines.push(`TOTAL APPS : ${fmtH(stats.totalH)}`);
    lines.push(`MOYENNE/JOUR : ${fmtH(stats.avgH)}`);
    lines.push(`JOURS TRACKÉS : ${stats.days}`);
    lines.push('');
    lines.push('=== DÉTAIL PAR JOUR ===');
    Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,v])=>{
      if(!v.total) return;
      lines.push('');
      lines.push(`${date} (total : ${fmtH(v.total)})`);
      Object.entries(v.apps||{}).sort((a,b)=>b[1]-a[1]).forEach(([app,h])=>{ lines.push(`  - ${app} : ${fmtH(h)}`); });
    });
    return lines.join('\n');
  };
  const doExport = () => showExportModal(buildExportText());

  const doFullExport = () => {
    const backup = {
      version: 35,
      exportedAt: new Date().toISOString(),
      data,
      myApps,
      appImages,
      settings: { theme, accentColor, fontSize, dailyGoal, showGoalBar, compactCards, weekStartMon }
    };
    const txt = JSON.stringify(backup);
    try {
      const blob = new Blob([txt], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const date = new Date().toISOString().slice(0,10);
      a.href     = url;
      a.download = `screenpulse-backup-${date}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setImportStatus('exported');
      setTimeout(()=>setImportStatus(null), 3000);
    } catch(e) {
      showExportModal(txt);
    }
  };

  const processImport = (txt) => {
    try {
      const cleaned = txt.replace(/^\uFEFF/, '').trim();
      const parsed  = JSON.parse(cleaned);
      if (!parsed || typeof parsed !== 'object') throw new Error('not object');
      if (!parsed.data && !parsed.myApps && !parsed.appImages) throw new Error('no sp fields');

      if (parsed.data)      setData(prev=>({...prev,...parsed.data}));
      if (parsed.myApps)    setMyApps(parsed.myApps);
      if (parsed.appImages) {
        setAppImages(prev=>{
          const merged = {...prev,...parsed.appImages};
          try { localStorage.setItem('app_images', JSON.stringify(merged)); } catch {}
          return merged;
        });
      }
      if (parsed.settings) {
        if (parsed.settings.theme)                          setTheme(parsed.settings.theme);
        if (parsed.settings.accentColor)                   setAccentColor(parsed.settings.accentColor);
        if (parsed.settings.fontSize)                      setFontSize(parsed.settings.fontSize);
        if (parsed.settings.dailyGoal)                     setDailyGoal(parsed.settings.dailyGoal);
        if (typeof parsed.settings.showGoalBar === 'boolean')  setShowGoalBar(parsed.settings.showGoalBar);
        if (typeof parsed.settings.compactCards === 'boolean') setCompactCards(parsed.settings.compactCards);
      }
      setImportStatus('ok');
      setImportText('');
      setTimeout(()=>setImportStatus(null), 5000);
    } catch(e) {
      console.error('Import error', e);
      setImportStatus('err');
      setTimeout(()=>setImportStatus(null), 5000);
    }
  };

  const handleImportFile = (file) => {
    if (!file) return;
    setImportStatus('loading');
    const reader = new FileReader();
    reader.onload  = (e) => processImport(e.target.result);
    reader.onerror = ()  => { setImportStatus('err'); setTimeout(()=>setImportStatus(null),5000); };
    reader.readAsText(file, 'utf-8');
  };

  const doImport = () => processImport(importText);

  const doReset = () => {
    setData({});
    setMyApps([]);
    setAppImages({});
    ['st_data','my_apps','app_images','sp_theme','sp_accent','sp_fontsize',
     'sp_goal','sp_showgoal','sp_compact','sp_weekmon','sp_confirmdelete'].forEach(k=>{
      try { localStorage.removeItem(k); } catch {}
    });
    try { window.name = ''; } catch {}
    setResetConfirm(false);
    setResetDone(true);
    setTimeout(()=>setResetDone(false), 3000);
  };

  const storageSizes = useMemo(()=>{
    const dataSize = JSON.stringify(data).length;
    const imgSize  = JSON.stringify(appImages).length;
    const appsSize = JSON.stringify(myApps).length;
    const total    = dataSize + imgSize + appsSize;
    return { dataSize, imgSize, appsSize, total, maxBytes: 5*1024*1024 };
  }, [data, appImages, myApps]);

  const daysTracked  = Object.keys(data).filter(k=>data[k].total>0).length;
  const firstDayKey  = Object.keys(data).sort()[0];
  const firstDayFmt  = firstDayKey
    ? new Date(firstDayKey+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})
    : null;


  // ── Rank row (cinematic)
  const RankRow=({app,h,i,total})=>(
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontSize:11,color:'var(--text-faint)',fontFamily:'Space Mono,monospace',width:26,textAlign:'right',flexShrink:0,fontWeight:700}}>{String(i+1).padStart(2,'0')}</span>
      <AppIcon name={app} color={COLORS[i%10]} size={18} appImages={appImages}/>
      <span style={{fontSize:14,color:'var(--text-primary)',width:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0,fontWeight:500}}>{app}</span>
      <div style={{flex:1,height:3,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:3,background:i===0?'var(--accent)':'var(--text-primary)',opacity:i===0?1:0.5,width:`${(h/stats.sorted[0][1])*100}%`}}/>
      </div>
      <span style={{fontSize:13,fontFamily:'Space Mono,monospace',color:'var(--text-primary)',width:50,textAlign:'right',flexShrink:0,fontWeight:600}}>{fmtH(h)}</span>
      <span style={{fontSize:11,color:'var(--text-muted)',width:32,textAlign:'right',flexShrink:0}}>{Math.round(h/total*100)}%</span>
    </div>
  );

  // ───────────────────────────────────────────────────────────────────────────
  return (
    <div style={S.root}>
      <Starfield/>

      {/* Header / Nav */}
      <header style={S.hdr}>
        <div style={S.hdrTop}>
          <div style={S.logo}>
            <span style={S.dot}></span>
            <span style={S.lt}>ScreenPulse</span>
          </div>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:'var(--accent)',letterSpacing:'0.1em'}}>v35</span>
        </div>
        <nav style={{...S.tabs,overflowX:'auto'}}>
          {['week','stats','apps','images','calc','settings'].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{...S.tab,...(view===v?S.tabA:{}),flexShrink:0}}>
              {v==='week'?'Aujourd\'hui':v==='stats'?'Stats':v==='apps'?'Apps':v==='images'?'Images':v==='calc'?'Calcul':'Réglages'}
            </button>
          ))}
        </nav>
      </header>

      {/* ─── WEEK VIEW (cinematic hero + week grid) ─── */}
      {view==='week'&&(
        <main>
          {/* HERO */}
          <section style={S.hero}>
            <div style={S.page}>
              <Reveal style={S.eyebrow}>{fmtDate(today())} · Écran</Reveal>
              <Reveal delay={80}>
                <h1 style={S.h1}>
                  <span style={S.h1Thin}>Tu as passé</span><br/>
                  <span className="mono" style={S.h1Accent}>{fmtH((data[todayKey]||{total:0}).total)}</span><br/>
                  <span style={S.h1Thin}>sur ton écran.</span>
                </h1>
              </Reveal>

                    </div>
                  )}
                  {importStatus==='exported'&&(
                    <div style={{padding:'11px 14px',borderRadius:12,background:'rgba(48,209,88,0.06)',border:'1px solid rgba(48,209,88,0.3)',fontSize:12,color:'var(--accent-green)',fontWeight:600}}>
                      ✅ Fichier téléchargé avec succès.
                    </div>
                  )}
                  {importStatus==='err'&&(
                    <div style={{padding:'11px 14px',borderRadius:12,background:'rgba(255,69,58,0.05)',border:'1px solid rgba(255,69,58,0.3)',fontSize:12,color:'var(--accent-red)',fontWeight:600,lineHeight:1.6}}>
                      ❌ Fichier non reconnu. Assure-toi d'utiliser un export ScreenPulse.
                    </div>
                  )}
                </div>
              </div>

              {/* PWA */}
              <div style={S.card} className="settings-section">
                <SectionHeader icon="📲" title="Installer l'application"/>
                <div style={{padding:'16px',borderRadius:14,background:'rgba(77,150,255,0.04)',border:'1px solid rgba(77,150,255,0.2)',marginBottom:18}}>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--text-primary)',marginBottom:8}}>Qu'est-ce que l'installation PWA ?</div>
                  <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.7}}>
                    Une fois installée, ScreenPulse apparaît dans la liste de tes apps, s'ouvre en plein écran sans barre de navigation, et <strong style={{color:'var(--accent-green)'}}>est comptée séparément dans le temps d'écran de ta tablette</strong> comme une vraie appli.
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:18}}>
                  {[
                    { n:'1', icon:'🌐', title:'Ouvre dans Chrome ou Safari', desc:'Copie l\'URL du fichier et ouvre-la dans le navigateur de ta tablette.' },
                    { n:'2', icon:'⋮', title:'Menu du navigateur', desc:'Sur Chrome : clique les 3 points en haut à droite. Sur Safari : clique le bouton Partager (⬆).' },
                    { n:'3', icon:'🏠', title:'Ajouter à l\'écran d\'accueil', desc:'Choisis "Ajouter à l\'écran d\'accueil" ou "Installer l\'application".' },
                    { n:'4', icon:'✅', title:'C\'est fait !', desc:'ScreenPulse apparaît maintenant dans tes apps.' },
                  ].map(s=>(
                    <div key={s.n} style={{display:'flex',gap:14,padding:'14px 16px',border:'1px solid var(--border)',borderRadius:14}}>
                      <div style={{width:34,height:34,borderRadius:11,background:'rgba(77,150,255,0.1)',border:'1px solid rgba(77,150,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{s.icon}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--text-primary)',marginBottom:3}}>{s.title}</div>
                        <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.5}}>{s.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div id="sp-pwa-install-wrap">
                  <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',lineHeight:1.6,padding:'8px 0'}}>
                    💡 Sur certains appareils Android avec Chrome, un bouton "Installer" peut apparaître automatiquement.
                  </div>
                </div>
                <div style={{marginTop:14,padding:'12px 16px',borderRadius:12,background:'rgba(255,214,10,0.04)',border:'1px solid rgba(255,214,10,0.2)',fontSize:11,color:'var(--accent-yellow)',lineHeight:1.6}}>
                  ⚠️ <strong>Important :</strong> Pour que ta tablette compte le temps sur ScreenPulse séparément, tu dois toujours lancer l'app depuis son icône sur l'écran d'accueil.
                </div>
              </div>

              {/* DANGER ZONE */}
              <div style={{...S.card,border:'1px solid rgba(255,69,58,0.25)'}} className="settings-section">
                <SectionHeader icon="⚠️" title="Zone dangereuse"/>
                {!resetConfirm&&!resetDone&&(
                  <button onClick={()=>setResetConfirm(true)} style={S.btnDanger}>
                    🗑 Effacer toutes les données
                  </button>
                )}
                {resetConfirm&&(
                  <div style={{background:'rgba(255,69,58,0.05)',border:'1px solid rgba(255,69,58,0.3)',borderRadius:14,padding:18}}>
                    <div style={{fontSize:13,color:'var(--text-primary)',marginBottom:8,fontWeight:600}}>⚠️ Attention, cette action est irréversible !</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16,lineHeight:1.6}}>
                      Toutes tes données de temps d'écran, tes applications personnalisées et tes images seront supprimées définitivement.
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={doReset} style={{flex:1,padding:'11px',borderRadius:999,border:'none',background:'var(--accent-red)',color:'#fff',fontSize:13,cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}>
                        Oui, tout effacer
                      </button>
                      <button onClick={()=>setResetConfirm(false)} style={{flex:1,padding:'11px',borderRadius:999,border:'1px solid var(--border)',background:'transparent',color:'var(--text-muted)',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>
                        Annuler
                      </button>
                    </div>
                  </div>
                )}
                {resetDone&&(
                  <div style={{padding:'13px 16px',borderRadius:14,background:'rgba(48,209,88,0.06)',border:'1px solid rgba(48,209,88,0.3)',fontSize:13,color:'var(--accent-green)',fontWeight:600}}>
                    ✅ Données effacées. L'app est remise à zéro.
                  </div>
                )}
              </div>

              {/* À PROPOS */}
              <div style={S.card} className="settings-section">
                <SectionHeader icon="ℹ️" title="À propos"/>
                <div style={{display:'flex',flexDirection:'column',gap:0}}>
                  {[
                    { label:'Application', value:'ScreenPulse' },
                    { label:'Version', value:'v35' },
                    { label:'Édition', value:'Cinématique' },
                    { label:'Jours trackés', value:`${daysTracked} jours` },
                    { label:'Premier jour', value: firstDayFmt || '–' },
                    { label:'Applications', value: `${myApps.length} perso · ${PRESETS.length} défaut` },
                    { label:'Images configurées', value: `${Object.keys(appImages).length} logo${Object.keys(appImages).length>1?'s':''}` },
                    { label:'Stockage', value:`${Math.round(storageSizes.total/1024)} ko utilisés` },
                    { label:'Technologie', value:'React 18' },
                  ].map(({label,value},i,arr)=>(
                    <div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderBottom:i<arr.length-1?'1px solid var(--border)':'none'}}>
                      <span style={{fontSize:13,color:'var(--text-muted)'}}>{label}</span>
                      <span className="mono" style={{fontSize:13,color:'var(--text-primary)',textAlign:'right',maxWidth:'60%'}}>{value}</span>
                    </div>
                  ))}
                </div>

                <div style={{marginTop:36,display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
                    <span style={{width:14,height:14,borderRadius:'50%',background:'var(--accent)',boxShadow:'0 0 16px var(--accent-glow)'}}/>
                    <span className="mono" style={{fontSize:22,fontWeight:700,letterSpacing:'-0.5px',color:'var(--text-primary)'}}>ScreenPulse</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'center',gap:16,marginBottom:20,flexWrap:'wrap'}}>
                    {[{emoji:'🔒',text:'100% local'},{emoji:'📡',text:'Hors-ligne'},{emoji:'🚫',text:'Sans pub'}].map(({emoji,text})=>(
                      <div key={text} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
                        <div style={{width:40,height:40,borderRadius:12,border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>{emoji}</div>
                        <span style={{fontSize:10,color:'var(--text-muted)'}}>{text}</span>
                      </div>
                    ))}
                  </div>
                  <div className="mono" style={{fontSize:10,color:'var(--text-faint)',letterSpacing:'0.1em',padding:'8px 18px',border:'1px solid var(--border)',borderRadius:999,display:'inline-block'}}>
                    VERSION v35 · ÉDITION CINÉMATIQUE
                  </div>
                </div>
              </div>

            </div>
          </section>
        </main>
      )}

      {/* ─── All apps modal ─── */}
      {showAll&&(
        <div style={S.ov} onClick={()=>{setShowAll(false);setSearchApp('');}}>
          <div style={{...S.mo,maxWidth:520,maxHeight:'82vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div style={S.mt}>🏆 Toutes les applications</div>
              <button style={S.miniBtn} onClick={()=>{setShowAll(false);setSearchApp('');}}>✕ Fermer</button>
            </div>
            <div style={S.msub}>{stats.sorted.length} apps · {rangeLabel}</div>
            <div style={{position:'relative',marginBottom:14}}>
              <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:14,color:'var(--text-muted)',pointerEvents:'none'}}>🔍</span>
              <input style={{...S.inp,width:'100%',paddingLeft:36,fontSize:13}} placeholder="Rechercher une application..." value={searchApp} onChange={e=>setSearchApp(e.target.value)} autoFocus/>
              {searchApp&&<button onClick={()=>setSearchApp('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16,lineHeight:1}}>✕</button>}
            </div>
            <div style={{overflowY:'auto',flex:1,display:'flex',flexDirection:'column',gap:10,paddingRight:4}}>
              {stats.sorted
                .filter(([a])=>!searchApp||a.toLowerCase().includes(searchApp.toLowerCase()))
                .map(([app,h])=>{
                  const realIdx=stats.sorted.findIndex(([a])=>a===app);
                  return (
                    <div key={app} style={{display:'flex',alignItems:'center',gap:8}}>
                      <span className="mono" style={{fontSize:12,width:28,textAlign:'right',flexShrink:0,color:'var(--text-muted)'}}>
                        {realIdx<3?['🥇','🥈','🥉'][realIdx]:`#${realIdx+1}`}
                      </span>
                      <AppIcon name={app} color={COLORS[realIdx%10]} size={16} appImages={appImages}/>
                      <span style={{fontSize:13,color:'var(--text-primary)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{app}</span>
                      <div style={{width:80,height:4,background:'var(--border)',borderRadius:3,overflow:'hidden',flexShrink:0}}>
                        <div style={{height:'100%',borderRadius:3,background:COLORS[realIdx%10],opacity:0.85,width:`${(h/stats.sorted[0][1])*100}%`}}/>
                      </div>
                      <span className="mono" style={{fontSize:12,color:'var(--text-primary)',width:46,textAlign:'right',flexShrink:0}}>{fmtH(h)}</span>
                      <span style={{fontSize:11,color:'var(--text-muted)',width:32,textAlign:'right',flexShrink:0}}>{Math.round(h/stats.totalH*100)}%</span>
                    </div>
                  );
                })}
            </div>
            {!searchApp&&(
              <div style={{borderTop:'1px solid var(--border-modal)',paddingTop:14,marginTop:6}}>
                <button onClick={doExport} style={{...S.btnGhost,width:'100%'}}>
                  📋 Voir & copier mes données
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ─── Time/App modal ─── */}
      {modal&&(
        <div style={S.ov} onClick={()=>setModal(null)}>
          <div style={S.mo} onClick={e=>e.stopPropagation()}>
            <div style={S.mt}>{modal.mode==='add'?'⏱ Modifier le temps':'📱 Ajouter une app'}</div>
            <div style={S.msub}>{fmtDate(modal.date)} {fmtY(modal.date)}</div>
            {modal.mode==='add'&&(
              <>
                <div style={{display:'flex',gap:10,marginBottom:20}}>
                  <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="23" placeholder="0" value={inputH} onChange={e=>setInputH(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>h</span></div>
                  <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="59" placeholder="0" value={inputM} onChange={e=>setInputM(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>min</span></div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button style={S.btnGreen} onClick={()=>doTime(true)}>+ Ajouter</button>
                  <button style={S.btnDanger} onClick={()=>doTime(false)}>− Retirer</button>
                  <button style={S.btnGhostSm} onClick={()=>setModal(null)}>Annuler</button>
                </div>
              </>
            )}
            {modal.mode==='app'&&(
              <>
                <div style={{marginBottom:16}}>
                  <select style={S.sel} value={selApp} onChange={e=>setSelApp(e.target.value)}>
                    <option value="">Choisir une application...</option>
                    {[...myApps.map(a=>({name:a.name,icon:a.icon})),...PRESETS.filter(p=>!myApps.find(a=>a.name===p)).map(p=>({name:p,icon:null}))]
                      .sort((a,b)=>a.name.localeCompare(b.name,'fr'))
                      .map(a=><option key={a.name} value={a.name}>{a.icon?`${a.icon} ${a.name}`:a.name}</option>)
                    }
                  </select>
                </div>
                <div style={{display:'flex',gap:10,marginBottom:20}}>
                  <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="23" placeholder="0" value={appH} onChange={e=>setAppH(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>h</span></div>
                  <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="59" placeholder="0" value={appM} onChange={e=>setAppM(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>min</span></div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button style={S.btnGreen} onClick={doApp}>Ajouter</button>
                  <button style={S.btnGhostSm} onClick={()=>setModal(null)}>Annuler</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* ─── Adjust modal ─── */}
      {adjustModal&&(
        <div style={S.ov} onClick={()=>setAdjustModal(false)}>
          <div style={S.mo} onClick={e=>e.stopPropagation()}>
            <div style={S.mt}>⚙️ Régler l'heure</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:18}}>
              <label style={S.pl}>Jour</label>
              <input type="date" style={{...S.di,width:'100%'}} value={calcDate} onChange={e=>setCalcDate(e.target.value)} max={toKey(today())}/>
            </div>
            <div style={S.msub}>Total actuel : <span className="mono" style={{color:'var(--accent)'}}>{fmtH((data[calcDate]||{total:0}).total)}</span></div>
            <div style={{display:'flex',gap:10,marginBottom:20}}>
              <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="23" placeholder="0" value={adjH} onChange={e=>setAdjH(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>h</span></div>
              <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="59" placeholder="0" value={adjM} onChange={e=>setAdjM(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>min</span></div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button style={S.btnGreen} onClick={()=>doAdjust(true)}>+ Ajouter</button>
              <button style={S.btnDanger} onClick={()=>doAdjust(false)}>− Retirer</button>
              <button style={S.btnGhostSm} onClick={()=>setAdjustModal(false)}>Annuler</button>
            </div>
          </div>
        </div>
      )}

      <InstallBanner/>
    </div>
  );
}

<script>
// ── PWA : Service Worker ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const SW = `
const CACHE = 'screenpulse-cinematic-v35';
const ASSETS = [
  'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
  'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
  'https://unpkg.com/@babel/standalone@7.29.7/babel.min.js',
  'https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE)
      .then(c => Promise.allSettled(ASSETS.map(u => c.add(new Request(u, {mode:'no-cors'})))))
      .then(() => self.skipWaiting())
  );
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys()
      .then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))
      .then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('', {status: 503})))
  );
});
`;
  try {
    const blob = new Blob([SW], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
  } catch(e) {}
}

// ── PWA : Manifest avec icône PNG embarquée ─────────────────────────
(function() {
  function makeIcon(size) {
    try {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const r = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
      ctx.arcTo(size,0,size,r,r); ctx.lineTo(size,size-r);
      ctx.arcTo(size,size,size-r,size,r); ctx.lineTo(r,size);
      ctx.arcTo(0,size,0,size-r,r); ctx.lineTo(0,r);
      ctx.arcTo(0,0,r,0,r); ctx.closePath();
      ctx.fillStyle = '#000000'; ctx.fill();
      ctx.beginPath();
      ctx.arc(size/2, size/2, size*0.35, 0, Math.PI*2);
      ctx.strokeStyle = '#4d96ff'; ctx.lineWidth = size*0.08; ctx.stroke();
      ctx.beginPath();
      ctx.arc(size/2, size/2, size*0.11, 0, Math.PI*2);
      ctx.fillStyle = '#4d96ff'; ctx.fill();
      return c.toDataURL('image/png');
    } catch(e) { return null; }
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);

  const icons = [];
  if (icon192) icons.push({ src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' });
  if (icon512) icons.push({ src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' });
  icons.push({
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23000000'/><circle cx='96' cy='96' r='67' fill='none' stroke='%234d96ff' stroke-width='14'/><circle cx='96' cy='96' r='22' fill='%234d96ff'/></svg>",
    sizes: '192x192', type: 'image/svg+xml'
  });

  const manifest = {
    name: 'ScreenPulse',
    short_name: 'ScreenPulse',
    description: 'Tracker de temps d\'écran personnel',
    start_url: location.href,
    scope: location.href,
    display: 'standalone',
    orientation: 'any',
    background_color: '#000000',
    theme_color: '#000000',
    lang: 'fr',
    categories: ['productivity', 'utilities'],
    icons
  };

  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const link = document.createElement('link');
    link.rel  = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch(e) {}
})();

// ── PWA : Gérer le prompt d'installation ────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window.__spInstallPrompt = e;
  const wrap = document.getElementById('sp-pwa-install-wrap');
  if (wrap) {
    wrap.innerHTML = '';
    const btn = document.createElement('button');
    btn.textContent = '📲 Installer ScreenPulse maintenant';
    btn.style.cssText = 'width:100%;padding:15px;border-radius:999px;border:none;background:#4d96ff;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;';
    btn.onclick = () => {
      e.prompt();
      e.userChoice.then(r => {
        if (r.outcome === 'accepted') {
          btn.textContent = '✅ Installation lancée !';
          btn.style.background = '#30d158';
          btn.disabled = true;
        }
      });
    };
    wrap.appendChild(btn);
  }
});

window.addEventListener('appinstalled', () => {
  const wrap = document.getElementById('sp-pwa-install-wrap');
  if (wrap) wrap.innerHTML = '<div style="padding:11px 14px;border-radius:12px;background:rgba(48,209,88,0.08);border:1px solid rgba(48,209,88,0.3);color:#30d158;font-size:12px;font-weight:700;text-align:center;">✅ ScreenPulse est installée sur ta tablette !</div>';
});
</script>
