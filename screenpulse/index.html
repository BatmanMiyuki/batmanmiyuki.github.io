<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>ScreenPulse</title>
  <meta name="theme-color" content="#080c14"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ScreenPulse"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23080c14'/><circle cx='50' cy='50' r='28' fill='none' stroke='%234d96ff' stroke-width='7'/><circle cx='50' cy='50' r='10' fill='%234d96ff'/></svg>"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23080c14'/><circle cx='50' cy='50' r='28' fill='none' stroke='%234d96ff' stroke-width='7'/><circle cx='50' cy='50' r='10' fill='%234d96ff'/></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{min-height:100%;background:var(--bg-root,#080c14)}
    body{font-family:'DM Sans',sans-serif;color:var(--text-primary,#e2e8f0);overscroll-behavior:none;transition:background 0.3s,color 0.3s}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#2a3040;border-radius:2px}
    input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield}
    input[type=date]{color-scheme:dark}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5) sepia(1) saturate(3) hue-rotate(180deg)}
    button:active{opacity:0.7}

    /* ── THEMES ─────────────────────────────────────────── */
    :root {
      --bg-root:#080c14;
      --bg-card:rgba(255,255,255,0.03);
      --bg-modal:#0f1724;
      --border:#1a2030;
      --border-modal:#1e2a3a;
      --text-primary:#e2e8f0;
      --text-muted:#8892a0;
      --text-faint:#4a5568;
      --accent:#4d96ff;
      --accent-green:#6bcb77;
      --accent-red:#ff6b6b;
      --accent-yellow:#ffd93d;
      --header-bg:rgba(8,12,20,0.92);
    }
    [data-theme="midnight"] {
      --bg-root:#060912;
      --bg-card:rgba(255,255,255,0.025);
      --bg-modal:#0b101e;
      --border:#161f30;
      --border-modal:#1a2640;
      --text-primary:#dde4f0;
      --text-muted:#6b7a8e;
      --accent:#7db4ff;
      --header-bg:rgba(6,9,18,0.95);
    }
    [data-theme="amoled"] {
      --bg-root:#000000;
      --bg-card:rgba(255,255,255,0.04);
      --bg-modal:#0a0a0a;
      --border:#1a1a1a;
      --border-modal:#222222;
      --text-primary:#ffffff;
      --text-muted:#666666;
      --accent:#4d96ff;
      --header-bg:rgba(0,0,0,0.98);
    }
    [data-theme="slate"] {
      --bg-root:#0e1117;
      --bg-card:rgba(255,255,255,0.04);
      --bg-modal:#141820;
      --border:#232b38;
      --border-modal:#2a3344;
      --text-primary:#c9d1e0;
      --text-muted:#7a8494;
      --accent:#60a5fa;
      --header-bg:rgba(14,17,23,0.95);
    }
    [data-theme="light"] {
      --bg-root:#f0f4f8;
      --bg-card:rgba(255,255,255,0.85);
      --bg-modal:#ffffff;
      --border:#dde3ec;
      --border-modal:#c8d0db;
      --text-primary:#1a2030;
      --text-muted:#5a6478;
      --text-faint:#aab0bc;
      --accent:#2563eb;
      --accent-green:#16a34a;
      --accent-red:#dc2626;
      --header-bg:rgba(240,244,248,0.95);
    }
    [data-theme="light"] input[type=date]{color-scheme:light}
    [data-theme="light"] input[type=date]::-webkit-calendar-picker-indicator{filter:none}
    [data-theme="light"] ::-webkit-scrollbar-thumb{background:#b0bac8}

    /* accent color variants */
    [data-accent="purple"] { --accent:#a855f7; }
    [data-accent="green"]  { --accent:#22c55e; }
    [data-accent="orange"] { --accent:#f97316; }
    [data-accent="pink"]   { --accent:#ec4899; }
    [data-accent="cyan"]   { --accent:#06b6d4; }
    [data-accent="gold"]   { --accent:#eab308; }

    /* font size */
    [data-font="small"]  { font-size: 14px; }
    [data-font="medium"] { font-size: 16px; }
    [data-font="large"]  { font-size: 18px; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .settings-section { animation: fadeIn 0.25s ease both; }
    .settings-section:nth-child(2){animation-delay:0.05s}
    .settings-section:nth-child(3){animation-delay:0.1s}
    .settings-section:nth-child(4){animation-delay:0.15s}
    .settings-section:nth-child(5){animation-delay:0.2s}
    .settings-section:nth-child(6){animation-delay:0.25s}
    .settings-section:nth-child(7){animation-delay:0.3s}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ── Helpers ───────────────────────────────────────────────────────────────────
const toKey  = d => { const l = new Date(d - d.getTimezoneOffset()*60000); return l.toISOString().slice(0,10); };
const today  = () => new Date();
const sow    = d => { const r=new Date(d); r.setDate(r.getDate()-((r.getDay()+6)%7)); r.setHours(0,0,0,0); return r; };
const addD   = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const fmtH   = h => { let hh=Math.floor(h); let mm=Math.round((h-hh)*60); if(mm===60){hh++;mm=0;} return mm?`${hh}h${String(mm).padStart(2,'0')}`:`${hh}h`; };
const fmtDate= d => d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
const fmtS   = d => d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
const fmtY   = d => d.getFullYear();

const COLORS  = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43','#00cec9','#fd79a8','#a29bfe','#55efc4'];
const PRESETS = ['TikTok','Instagram','YouTube','Netflix','Snapchat','Twitter/X','WhatsApp','Spotify','Chrome','Safari','Discord','Twitch','Reddit','Pinterest','LinkedIn'];

const THEMES = [
  { id:'default',  label:'Défaut',   desc:'Bleu nuit classique',   preview:['#080c14','#4d96ff','#6bcb77'] },
  { id:'midnight', label:'Midnight', desc:'Bleu profond doux',     preview:['#060912','#7db4ff','#6bcb77'] },
  { id:'amoled',   label:'AMOLED',   desc:'Noir pur, yeux reposés',preview:['#000000','#4d96ff','#ffffff'] },
  { id:'slate',    label:'Slate',    desc:'Ardoise équilibrée',    preview:['#0e1117','#60a5fa','#6bcb77'] },
  { id:'light',    label:'Light',    desc:'Mode clair',            preview:['#f0f4f8','#2563eb','#16a34a'] },
];

const ACCENTS = [
  { id:'default', label:'Bleu',    color:'#4d96ff' },
  { id:'purple',  label:'Violet',  color:'#a855f7' },
  { id:'green',   label:'Vert',    color:'#22c55e' },
  { id:'orange',  label:'Orange',  color:'#f97316' },
  { id:'pink',    label:'Rose',    color:'#ec4899' },
  { id:'cyan',    label:'Cyan',    color:'#06b6d4' },
  { id:'gold',    label:'Or',      color:'#eab308' },
];

const GOAL_OPTIONS = [1,2,3,4,5,6,7,8,10,12];

// ── Storage multi-couche (localStorage → cookie → window.name) ────────────────
// Raison : dans SPCK/webview, localStorage peut être vidé entre sessions.
// On écrit dans les 3 stockages simultanément et on lit le premier disponible.

const WN_KEY = '__sp_wn__';

// ── Lecture window.name (objet JSON encodé)
const _wnGet = (k) => {
  try {
    const o = window.name && window.name.startsWith(WN_KEY)
      ? JSON.parse(window.name.slice(WN_KEY.length))
      : {};
    return k in o ? o[k] : undefined;
  } catch { return undefined; }
};
const _wnSet = (k, v) => {
  try {
    const o = window.name && window.name.startsWith(WN_KEY)
      ? JSON.parse(window.name.slice(WN_KEY.length))
      : {};
    o[k] = v;
    window.name = WN_KEY + JSON.stringify(o);
  } catch {}
};

// ── Cookie helpers (max 4 ko chacun — utilisé uniquement pour les petites clés)
const _cookieSet = (k, v) => {
  try {
    const enc = encodeURIComponent(v);
    if (enc.length > 3800) return; // trop grand pour un cookie
    document.cookie = `${k}=${enc};path=/;max-age=31536000;SameSite=Lax`;
  } catch {}
};
const _cookieGet = (k) => {
  try {
    const m = document.cookie.match(new RegExp('(?:^|; )' + k + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : undefined;
  } catch { return undefined; }
};

// ── API publique
const load = (k, d) => {
  // 1. localStorage
  try {
    const v = localStorage.getItem(k);
    if (v !== null) return JSON.parse(v);
  } catch {}
  // 2. window.name
  try {
    const v = _wnGet(k);
    if (v !== undefined) return v;
  } catch {}
  // 3. cookie (petites clés seulement)
  try {
    const v = _cookieGet(k);
    if (v !== undefined) return JSON.parse(v);
  } catch {}
  return d;
};

const save = (k, v) => {
  const s = JSON.stringify(v);
  // 1. localStorage
  try { localStorage.setItem(k, s); } catch {}
  // 2. window.name (toujours — persiste dans l'onglet)
  try { _wnSet(k, v); } catch {}
  // 3. cookie (uniquement si assez petit)
  try { _cookieSet(k, s); } catch {}
};

// ── Vérification que localStorage fonctionne vraiment
const _lsWorks = (() => {
  try {
    localStorage.setItem('__sp_test__','1');
    const ok = localStorage.getItem('__sp_test__') === '1';
    localStorage.removeItem('__sp_test__');
    return ok;
  } catch { return false; }
})();

// ── AppIcon ───────────────────────────────────────────────────────────────────
function AppIcon({ name, color, size=16, appImages={} }) {
  const img = appImages[name];
  if (img) return (
    <span style={{width:size,height:size,borderRadius:size*0.3,overflow:'hidden',flexShrink:0,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <img src={img} alt={name} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:size*0.3}}/>
    </span>
  );
  return <span style={{width:size,height:size,borderRadius:'50%',background:color,flexShrink:0,display:'inline-block'}}/>;
}

// ── Animated Starfield Background ────────────────────────────────────────────
function Starfield() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, raf;

    const resize = () => {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    // Étoiles statiques scintillantes
    const stars = Array.from({ length: 130 }, () => ({
      x:    Math.random(),
      y:    Math.random(),
      r:    Math.random() * 1.3 + 0.15,
      base: 0.1 + Math.random() * 0.55,
      spd:  0.4 + Math.random() * 1.2,
      phase:Math.random() * Math.PI * 2,
    }));

    // Pool d'étoiles filantes
    const shoots = [];
    let lastSpawn = 0;
    let nextInterval = 1600 + Math.random() * 2200;

    const spawnShoot = () => {
      const fromTop = Math.random() > 0.25;
      const sx = fromTop ? Math.random() * W : (Math.random() < 0.5 ? -20 : W + 20);
      const sy = fromTop ? -20 : Math.random() * H * 0.45;
      const angle  = (Math.PI / 5.5) + (Math.random() - 0.5) * 0.35;
      const dirX   = sx > W / 2 ? -1 : 1;
      const speed  = 6 + Math.random() * 8;
      const length = 90 + Math.random() * 180;
      shoots.push({
        x: sx, y: sy,
        vx: Math.cos(angle) * speed * dirX,
        vy: Math.sin(angle) * speed,
        length, life: 1, alpha: 0,
        color: Math.random() > 0.7 ? [200, 230, 255] : [255, 255, 255],
      });
    };

    // Orbes nébuleuses (décor)
    const orbs = [
      { rx: 0.12, ry: 0.18, rr: 0.32, c: '77,150,255',   a: 0.07 },
      { rx: 0.88, ry: 0.78, rr: 0.26, c: '107,203,119',  a: 0.05 },
      { rx: 0.50, ry: 0.45, rr: 0.20, c: '199,125,255',  a: 0.04 },
    ];

    let last = 0;
    const draw = (ts) => {
      raf = requestAnimationFrame(draw);
      const dt = Math.min(ts - last, 50); last = ts;
      ctx.clearRect(0, 0, W, H);

      // Nébuleuses
      orbs.forEach(o => {
        const grd = ctx.createRadialGradient(o.rx*W, o.ry*H, 0, o.rx*W, o.ry*H, o.rr * Math.max(W, H));
        grd.addColorStop(0, `rgba(${o.c},${o.a})`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);
      });

      // Étoiles scintillantes
      const t = ts * 0.001;
      stars.forEach(s => {
        const alpha = Math.max(0.04, s.base + Math.sin(t * s.spd + s.phase) * 0.38);
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.fill();
      });

      // Spawn
      if (ts - lastSpawn > nextInterval && shoots.length < 3) {
        spawnShoot();
        lastSpawn = ts;
        nextInterval = 1600 + Math.random() * 2400;
      }

      // Étoiles filantes
      for (let i = shoots.length - 1; i >= 0; i--) {
        const s = shoots[i];
        if (s.life > 0.35) s.alpha = Math.min(1, s.alpha + 0.07);
        else               s.alpha = (s.life / 0.35) * 0.95;

        const speed = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
        const nx = s.vx / speed, ny = s.vy / speed;
        const tx = s.x - nx * s.length, ty = s.y - ny * s.length;

        const grd = ctx.createLinearGradient(tx, ty, s.x, s.y);
        const [r,g,b] = s.color;
        grd.addColorStop(0,   'transparent');
        grd.addColorStop(0.55,`rgba(${r},${g},${b},${(s.alpha*0.25).toFixed(2)})`);
        grd.addColorStop(1,   `rgba(${r},${g},${b},${(s.alpha*0.92).toFixed(2)})`);

        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = grd;
        ctx.lineWidth   = 1.4;
        ctx.lineCap     = 'round';
        ctx.stroke();

        // Tête lumineuse + petit halo
        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 6);
        glow.addColorStop(0, `rgba(${r},${g},${b},${(s.alpha*0.6).toFixed(2)})`);
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s.x, s.y, 1.4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha.toFixed(2)})`; ctx.fill();

        s.x += s.vx * (dt / 16);
        s.y += s.vy * (dt / 16);
        s.life -= 0.011 * (dt / 16);

        if (s.life <= 0 || s.x < -100 || s.x > W+100 || s.y > H+100) {
          shoots.splice(i, 1);
        }
      }
    };

    raf = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);

  return (
    <canvas ref={canvasRef} style={{
      position:'fixed', inset:0, width:'100%', height:'100%',
      pointerEvents:'none', zIndex:0,
    }}/>
  );
}

// ── SVG Charts ────────────────────────────────────────────────────────────────
function BarChart({ data, todayKey }) {
  const W=340,H=150,PL=30,PB=22,PT=14,PR=8;
  const iW=W-PL-PR, iH=H-PB-PT;
  const maxV=Math.max(...data.map(d=>d.h),0.5);
  const barW=Math.max(Math.floor(iW/data.length*0.5),4);
  const gap=iW/data.length;
  const ticks=[0,Math.ceil(maxV/2),Math.ceil(maxV)];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
      {ticks.map(v=>{
        const y=PT+iH-(v/maxV)*iH;
        return <g key={v}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
          <text x={PL-4} y={y+4} textAnchor="end" fill="var(--text-muted)" fontSize="9" fontFamily="Space Mono,monospace">{v>0?`${v}h`:''}</text>
        </g>;
      })}
      {data.map((d,i)=>{
        const bH=Math.max((d.h/maxV)*iH, d.h>0?3:0);
        const x=PL+gap*i+gap/2-barW/2;
        const y=PT+iH-bH;
        const c=d.key===todayKey?'var(--accent-green)':'var(--accent)';
        return <g key={i}>
          <rect x={x} y={y} width={barW} height={bH} rx="4" fill={c} fillOpacity="0.85"/>
          <text x={PL+gap*i+gap/2} y={H-5} textAnchor="middle" fill="var(--text-muted)" fontSize="9" fontFamily="Space Mono,monospace">{d.name}</text>
          {d.h>0&&<text x={PL+gap*i+gap/2} y={y-3} textAnchor="middle" fill="var(--text-primary)" fontSize="8" fontFamily="Space Mono,monospace">{fmtH(d.h)}</text>}
        </g>;
      })}
    </svg>
  );
}

function LineChart({ data }) {
  if (data.length<2) return null;
  const W=340,H=120,PL=30,PB=18,PT=10,PR=8;
  const iW=W-PL-PR, iH=H-PB-PT;
  const maxV=Math.max(...data.map(d=>d.total),0.5);
  const pts=data.map((d,i)=>[PL+(i/(data.length-1))*iW, PT+iH-(d.total/maxV)*iH]);
  const path=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  const area=`M${pts[0][0]},${PT+iH} ${pts.map(p=>`L${p[0]},${p[1]}`).join(' ')} L${pts[pts.length-1][0]},${PT+iH} Z`;
  const ticks=[0,Math.ceil(maxV/2),Math.ceil(maxV)];
  const step=Math.ceil(data.length/6);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent-green)" stopOpacity="0.25"/><stop offset="100%" stopColor="var(--accent-green)" stopOpacity="0"/></linearGradient></defs>
      {ticks.map(v=>{
        const y=PT+iH-(v/maxV)*iH;
        return <g key={v}>
          <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
          <text x={PL-4} y={y+4} textAnchor="end" fill="var(--text-muted)" fontSize="9" fontFamily="Space Mono,monospace">{v>0?`${v}h`:''}</text>
        </g>;
      })}
      <path d={area} fill="url(#lg)"/>
      <path d={path} fill="none" stroke="var(--accent-green)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i)=>{
        if(i%step!==0&&i!==data.length-1) return null;
        return <text key={i} x={pts[i][0]} y={H-3} textAnchor="middle" fill="var(--text-muted)" fontSize="8" fontFamily="Space Mono,monospace">{d.key.slice(5)}</text>;
      })}
    </svg>
  );
}

function DonutChart({ data }) {
  if (!data.length) return null;
  const CX=110,CY=95,R=78,IR=50;
  const total=data.reduce((a,d)=>a+d.v,0);
  let angle=-Math.PI/2;
  const slices=data.slice(0,8).map((d,i)=>{
    const sw=(d.v/total)*2*Math.PI;
    const a1=angle,a2=angle+sw; angle=a2;
    const x1=CX+R*Math.cos(a1),y1=CY+R*Math.sin(a1);
    const x2=CX+R*Math.cos(a2),y2=CY+R*Math.sin(a2);
    const ix1=CX+IR*Math.cos(a2),iy1=CY+IR*Math.sin(a2);
    const ix2=CX+IR*Math.cos(a1),iy2=CY+IR*Math.sin(a1);
    const lg=sw>Math.PI?1:0;
    return {path:`M${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${ix1},${iy1} A${IR},${IR} 0 ${lg} 0 ${ix2},${iy2} Z`,color:COLORS[i%10]};
  });
  return (
    <svg viewBox="0 0 220 190" style={{width:'100%',maxWidth:220,display:'block',margin:'0 auto'}}>
      {slices.map((sl,i)=><path key={i} d={sl.path} fill={sl.color} fillOpacity="0.88" stroke="var(--bg-root)" strokeWidth="2"/>)}
      <text x={CX} y={CY-5} textAnchor="middle" fill="var(--text-primary)" fontSize="18" fontWeight="700" fontFamily="Space Mono,monospace">{data.length}</text>
      <text x={CX} y={CY+13} textAnchor="middle" fill="var(--text-muted)" fontSize="10" fontFamily="DM Sans,sans-serif">applications</text>
    </svg>
  );
}

// ── Export modal ──────────────────────────────────────────────────────────────
function showExportModal(txt) {
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML=`
    <div style="background:var(--bg-modal,#0f1724);border:1px solid #1e2a3a;border-radius:16px;padding:20px;width:100%;max-width:500px;max-height:82vh;display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#fff;font-weight:700;font-size:15px;font-family:DM Sans,sans-serif">📋 Tes données</span>
        <button id="sp-close" style="background:none;border:none;color:#8892a0;font-size:22px;cursor:pointer;line-height:1">✕</button>
      </div>
      <textarea id="sp-export-txt" readonly style="flex:1;min-height:300px;background:#080c14;border:1px solid #1e2a3a;border-radius:10px;color:#e2e8f0;font-family:monospace;font-size:11px;padding:12px;resize:none;outline:none;line-height:1.6"></textarea>
      <button id="sp-copy" style="padding:13px;border-radius:10px;border:none;background:#4d96ff;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:DM Sans,sans-serif">📋 Copier tout</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('sp-export-txt').value = txt;
  document.getElementById('sp-close').onclick = () => overlay.remove();
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.getElementById('sp-copy').onclick = () => {
    const ta = document.getElementById('sp-export-txt');
    ta.select();ta.setSelectionRange(0, 99999);
    let copied = false;
    try { copied = document.execCommand('copy'); } catch(e) {}
    if (!copied && navigator.clipboard) { navigator.clipboard.writeText(txt).catch(()=>{}); copied = true; }
    const btn = document.getElementById('sp-copy');
    if (btn) { btn.textContent = '✅ Copié !'; setTimeout(()=>{ if(btn) btn.textContent='📋 Copier tout'; }, 2000); }
  };
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [data,setData]             = useState(()=>load('st_data',{}));
  const [week,setWeek]             = useState(()=>sow(today()));
  const [view,setView]             = useState('week');

  const [calcRows,setCalcRows]     = useState([{h:'',m:'',label:''}]);
  const [calcDate,setCalcDate]     = useState(()=>toKey(today()));
  const [publishDone,setPublishDone] = useState(false);
  const [adjustModal,setAdjustModal] = useState(false);
  const [adjH,setAdjH]               = useState('');
  const [adjM,setAdjM]               = useState('');
  const [myApps,setMyApps]         = useState(()=>load('my_apps',[]));
  const [newAppName,setNewAppName] = useState('');
  const [newAppIcon,setNewAppIcon] = useState('📱');
  const [appImages,setAppImages]   = useState(()=>load('app_images',{}));
  const [imgSearch,setImgSearch]   = useState('');

  // ── Settings state
  const [theme,setThemeState]      = useState(()=>load('sp_theme','default'));
  const [accentColor,setAccentColor] = useState(()=>load('sp_accent','default'));
  const [fontSize,setFontSize]     = useState(()=>load('sp_fontsize','medium'));
  const [dailyGoal,setDailyGoal]   = useState(()=>load('sp_goal',4));
  const [showGoalBar,setShowGoalBar] = useState(()=>load('sp_showgoal',true));
  const [compactCards,setCompactCards] = useState(()=>load('sp_compact',false));
  const [weekStartMon,setWeekStartMon] = useState(()=>load('sp_weekmon',true));
  const [confirmDelete,setConfirmDelete] = useState(()=>load('sp_confirmdelete',true));
  const [importText,setImportText] = useState('');
  const [importStatus,setImportStatus] = useState(null); // null | 'ok' | 'err'
  const [resetConfirm,setResetConfirm] = useState(false);
  const [resetDone,setResetDone]   = useState(false);
  const storageOk = _lsWorks; // vrai si localStorage fonctionne

  // Apply theme to document
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', theme==='default'?'':theme);
    save('sp_theme',theme);
  },[theme]);
  useEffect(()=>{
    document.documentElement.setAttribute('data-accent', accentColor==='default'?'':accentColor);

    document.documentElement.setAttribute('data-font', fontSize);
    save('sp_fontsize',fontSize);
  },[fontSize]);
  useEffect(()=>{ save('sp_goal',dailyGoal); },[dailyGoal]);
  useEffect(()=>{ save('sp_showgoal',showGoalBar); },[showGoalBar]);
  useEffect(()=>{ save('sp_compact',compactCards); },[compactCards]);
  useEffect(()=>{ save('sp_weekmon',weekStartMon); },[weekStartMon]);
  useEffect(()=>{ save('sp_confirmdelete',confirmDelete); },[confirmDelete]);

  useEffect(()=>{ save('st_data',data); },[data]);
  useEffect(()=>{ save('my_apps',myApps); },[myApps]);
  useEffect(()=>{ try{ localStorage.setItem('app_images',JSON.stringify(appImages)); }catch{} },[appImages]);

  const setTheme = (t) => setThemeState(t);

  const allApps = useMemo(()=>[...myApps.map(a=>a.name), ...PRESETS.filter(p=>!myApps.find(a=>a.name===p))],[myApps]);

  const addMyApp = ()=>{
    const name=newAppName.trim();
    if(!name||myApps.find(a=>a.name===name)) return;
    setMyApps(p=>[{name,icon:newAppIcon},...p]);
    setNewAppName('');setNewAppIcon('📱');
  };
  const delMyApp = name=>setMyApps(p=>p.filter(a=>a.name!==name));

  const uploadImage=(appName,file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=128;
        const ratio=Math.min(MAX/img.width, MAX/img.height, 1);
        const canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        const compressed=canvas.toDataURL('image/jpeg',0.7);
        setAppImages(p=>{
          const next={...p,[appName]:compressed};
          try{ localStorage.setItem('app_images',JSON.stringify(next)); }
          catch(err){
            const sorted=Object.entries(next).sort((a,b)=>b[1].length-a[1].length);
            const trimmed=Object.fromEntries(sorted.slice(1));
            trimmed[appName]=compressed;
            localStorage.setItem('app_images',JSON.stringify(trimmed));
            return trimmed;
          }
          return next;
        });
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  const delImage=appName=>setAppImages(p=>{const n={...p};delete n[appName];return n;});

  // ── Calculator
  const calcTotal = useMemo(()=>calcRows.reduce((acc,r)=>{
    const h=(parseFloat(r.h)||0)+(parseFloat(r.m)||0)/60; return acc+h;
  },0),[calcRows]);
  const updRow=(i,field,val)=>setCalcRows(p=>p.map((r,j)=>j===i?{...r,[field]:val}:r));
  const addRow=()=>setCalcRows(p=>[...p,{h:'',m:'',label:''}]);
  const delRow=i=>setCalcRows(p=>p.length===1?p:p.filter((_,j)=>j!==i));
  const resetCalc=()=>{ setCalcRows([{h:'',m:'',label:''}]); setPublishDone(false); };

  const doAdjust=(plus)=>{
    const h=(parseFloat(adjH)||0)+(parseFloat(adjM)||0)/60;
    if(h<=0) return;
    setData(prev=>{
      const old=prev[calcDate]||{total:0,apps:{}};
      return {...prev,[calcDate]:{...old,total:Math.max(0,old.total+(plus?h:-h))}};
    });
    setAdjH('');setAdjM('');setAdjustModal(false);
  };

  const publishCalc=()=>{
    if(calcTotal<=0) return;
    const allKnown=[...myApps.map(a=>a.name),...PRESETS];
    const canonicalize=label=>{
      const low=label.trim().toLowerCase();
      const match=allKnown.find(a=>a.toLowerCase()===low);
      return match||label.trim();
    };
    setData(prev=>{
      const old=prev[calcDate]||{total:0,apps:{}};
      const newApps={...old.apps};
      calcRows.forEach(r=>{
        const h=(parseFloat(r.h)||0)+(parseFloat(r.m)||0)/60;
        if(r.label.trim()&&h>0){
          const canonical=canonicalize(r.label);
          newApps[canonical]=h;
        }
      });
      return {...prev,[calcDate]:{total:calcTotal,apps:newApps}};
    });
    setPublishDone(true);
  };

  const todayKey = toKey(today());
  const days = useMemo(()=>Array.from({length:7},(_,i)=>addD(week,i)),[week]);
  const weekData = days.map(d=>{
    const k=toKey(d),e=data[k]||{total:0,apps:{}};
    return {date:d,key:k,total:e.total,apps:e.apps||{}};
  });
  const avgW = useMemo(()=>{
    const f=weekData.filter(d=>d.total>0);
    return f.length?f.reduce((a,d)=>a+d.total,0)/f.length:0;
  },[weekData]);

  const stats = useMemo(()=>{
    const entries=range
      ?Object.entries(data).filter(([k])=>k>=range.from&&k<=range.to)
      :Object.entries(data);
    const appT={};
    entries.forEach(([,v])=>Object.entries(v.apps||{}).forEach(([app,h])=>{ appT[app]=(appT[app]||0)+h; }));
    const sorted=Object.entries(appT).sort((a,b)=>b[1]-a[1]);
    const totalH=sorted.reduce((a,[,h])=>a+h,0);
    const daily=entries
      .filter(([,v])=>v.total>0)
      .map(([k,v])=>({key:k,total:v.total}))
      .sort((a,b)=>a.key.localeCompare(b.key));
    const avgH=daily.length>0?daily.reduce((a,d)=>a+d.total,0)/daily.length:0;
    return {totalH,avgH,sorted,daily,days:daily.length};
  },[data,range]);

  // ── Stats pour une app précise (focus)
  const appStats = useMemo(()=>{
    if (!focusedApp) return null;
    const days = Object.entries(data)
      .map(([k,v])=>({ key:k, h:(v.apps||{})[focusedApp]||0 }))
      .filter(d=>d.h>0)
      .sort((a,b)=>b.h-a.h);
    const total = days.reduce((acc,d)=>acc+d.h, 0);
    const top10 = days.slice(0,10);
    const avgH  = days.length ? total/days.length : 0;
    const best  = top10[0] || null;
    return { total, avgH, days: days.length, top10, best };
  }, [focusedApp, data]);

  // ── Liste des apps connues (pour le picker)
  const allKnownApps = useMemo(()=>{
    const fromData = new Set();
    Object.values(data).forEach(v=>Object.keys(v.apps||{}).forEach(a=>fromData.add(a)));
    return [...fromData].sort((a,b)=>a.localeCompare(b,'fr'));
  }, [data]);

  const records = useMemo(()=>{
    const allEntries=Object.entries(data).filter(([,v])=>v.total>0);
    if(!allEntries.length) return null;
    const sorted=[...allEntries].sort((a,b)=>b[1].total-a[1].total);
    const bestDay=sorted[0];
    const worstDay=sorted[sorted.length-1];
    const currentWeekKey = toKey(sow(today()));
    const weekMap={};
    allEntries.forEach(([k,v])=>{
      const d=new Date(k+'T00:00:00');
      const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
      const wk=toKey(mon);
      if(wk===currentWeekKey) return;
      weekMap[wk]=(weekMap[wk]||0)+v.total;
    });
    const weekEntries=Object.entries(weekMap).sort((a,b)=>b[1]-a[1]);
    if(weekEntries.length<1) return {bestDay,worstDay,bestWeek:null,worstWeek:null,topAppEntry:null};
    const bestWeek=weekEntries[0];
    const worstWeek=weekEntries[weekEntries.length-1];
    let topDayApp=null;
    Object.entries(data).forEach(([k,v])=>{
      Object.entries(v.apps||{}).forEach(([app,h])=>{
        if(!topDayApp||h>topDayApp.h) topDayApp={app,h,date:k};
      });
    });
    return {bestDay,worstDay,bestWeek,worstWeek,topDayApp};
  },[data]);

  const openAdd = d=>{setModal({date:d,mode:'add'});setInputH('');setInputM('');};
  const openApp = d=>{setModal({date:d,mode:'app'});setSelApp('');setCustApp('');setAppH('');setAppM('');};

  const doTime = plus=>{
    const h=(parseFloat(inputH)||0)+(parseFloat(inputM)||0)/60;
    if(h<=0) return;
    const k=toKey(modal.date);
    setData(p=>{const o=p[k]||{total:0,apps:{}}; return {...p,[k]:{...o,total:Math.max(0,o.total+(plus?h:-h))}}; });
    setModal(null);
  };
  const doApp = ()=>{
    const app=selApp==='_c'?custApp.trim():selApp;
    if(!app) return;
    const h=(parseFloat(appH)||0)+(parseFloat(appM)||0)/60;
    if(h<=0) return;
    const k=toKey(modal.date);
    setData(p=>{const o=p[k]||{total:0,apps:{}}; const apps={...o.apps,[app]:(o.apps[app]||0)+h}; return {...p,[k]:{...o,apps}}; });
    setModal(null);
  };
  const delApp=(dk,app)=>setData(p=>{const o=p[dk]||{total:0,apps:{}}; const apps={...o.apps}; delete apps[app]; return {...p,[dk]:{...o,apps}}; });

  const quickRange=(d,yr)=>{
    const t=today(),toS=toKey(t),frS=yr?`${t.getFullYear()}-01-01`:toKey(addD(t,-d+1));
    setRFrom(frS);setRTo(toS);setRange({from:frS,to:toS});setShowPicker(false);
  };

  const rangeLabel=range
    ?`${range.from.slice(8)}.${range.from.slice(5,7)}.${range.from.slice(0,4)} → ${range.to.slice(8)}.${range.to.slice(5,7)}.${range.to.slice(0,4)}`
    :'Depuis toujours';

  // ── Export
  const buildExportText = () => {
    const lines=['📊 Export ScreenPulse — ' + new Date().toLocaleDateString('fr-FR'),''];
    lines.push('=== CLASSEMENT DES APPLICATIONS ===');
    stats.sorted.forEach(([app,h],i)=>{ lines.push(`#${i+1} ${app} : ${fmtH(h)}`); });
    lines.push('');
    lines.push(`TOTAL APPS : ${fmtH(stats.totalH)}`);
    lines.push(`MOYENNE/JOUR : ${fmtH(stats.avgH)}`);
    lines.push(`JOURS TRACKÉS : ${stats.days}`);
    lines.push('');
    lines.push('=== DÉTAIL PAR JOUR ===');
    Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,v])=>{
      if(!v.total) return;
      lines.push('');
      lines.push(`${date} (total : ${fmtH(v.total)})`);
      Object.entries(v.apps||{}).sort((a,b)=>b[1]-a[1]).forEach(([app,h])=>{ lines.push(`  - ${app} : ${fmtH(h)}`); });
    });
    return lines.join('\n');
  };
  const doExport = () => showExportModal(buildExportText());

  // ── Full JSON export — téléchargement direct du fichier (pas de textarea)
  const doFullExport = () => {
    const backup = {
      version: 34,
      exportedAt: new Date().toISOString(),
      data,
      myApps,
      appImages,
      settings: { theme, accentColor, fontSize, dailyGoal, showGoalBar, compactCards, weekStartMon }
    };
    const txt = JSON.stringify(backup);
    // Téléchargement direct via lien invisible
    try {
      const blob = new Blob([txt], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const date = new Date().toISOString().slice(0,10);
      a.href     = url;
      a.download = `screenpulse-backup-${date}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setImportStatus('exported');
      setTimeout(()=>setImportStatus(null), 3000);
    } catch(e) {
      // Fallback : modal copier-coller si téléchargement impossible (SPCK)
      showExportModal(txt);
    }
  };

  // ── Traitement commun d'un JSON importé
  const processImport = (txt) => {
    try {
      // Nettoyage : enlever BOM, espaces en début/fin
      const cleaned = txt.replace(/^\uFEFF/, '').trim();
      const parsed  = JSON.parse(cleaned);
      if (!parsed || typeof parsed !== 'object') throw new Error('not object');
      if (!parsed.data && !parsed.myApps && !parsed.appImages) throw new Error('no sp fields');

      if (parsed.data)      setData(prev=>({...prev,...parsed.data}));
      if (parsed.myApps)    setMyApps(parsed.myApps);
      if (parsed.appImages) {
        setAppImages(prev=>{
          const merged = {...prev,...parsed.appImages};
          try { localStorage.setItem('app_images', JSON.stringify(merged)); } catch {}
          return merged;
        });
      }
      if (parsed.settings) {
        if (parsed.settings.theme)                          setTheme(parsed.settings.theme);
        if (parsed.settings.accentColor)                   setAccentColor(parsed.settings.accentColor);
        if (parsed.settings.fontSize)                      setFontSize(parsed.settings.fontSize);
        if (parsed.settings.dailyGoal)                     setDailyGoal(parsed.settings.dailyGoal);
        if (typeof parsed.settings.showGoalBar === 'boolean')  setShowGoalBar(parsed.settings.showGoalBar);
        if (typeof parsed.settings.compactCards === 'boolean') setCompactCards(parsed.settings.compactCards);
      }
      setImportStatus('ok');
      setImportText('');
      setTimeout(()=>setImportStatus(null), 5000);
    } catch(e) {
      console.error('Import error', e);
      setImportStatus('err');
      setTimeout(()=>setImportStatus(null), 5000);
    }
  };

  // ── Import via fichier sélectionné
  const handleImportFile = (file) => {
    if (!file) return;
    setImportStatus('loading');
    const reader = new FileReader();
    reader.onload  = (e) => processImport(e.target.result);
    reader.onerror = ()  => { setImportStatus('err'); setTimeout(()=>setImportStatus(null),5000); };
    reader.readAsText(file, 'utf-8');
  };

  // ── Import via coller (textarea) — fallback
  const doImport = () => processImport(importText);

  // ── Reset all data
  const doReset = () => {
    setData({});
    setMyApps([]);
    setAppImages({});
    // Effacer uniquement les clés ScreenPulse, pas tout le localStorage
    ['st_data','my_apps','app_images','sp_theme','sp_accent','sp_fontsize',
     'sp_goal','sp_showgoal','sp_compact','sp_weekmon','sp_confirmdelete'].forEach(k=>{
      try { localStorage.removeItem(k); } catch {}
    });
    try { window.name = ''; } catch {}
    setResetConfirm(false);
    setResetDone(true);
    setTimeout(()=>setResetDone(false), 3000);
  };

  // ── Storage size calc
  const storageSizes = useMemo(()=>{
    const dataSize = JSON.stringify(data).length;
    const imgSize  = JSON.stringify(appImages).length;
    const appsSize = JSON.stringify(myApps).length;
    const total    = dataSize + imgSize + appsSize;
    return { dataSize, imgSize, appsSize, total, maxBytes: 5*1024*1024 };
  }, [data, appImages, myApps]);

  // ── Days tracked
  const daysTracked  = Object.keys(data).filter(k=>data[k].total>0).length;
  const firstDayKey  = Object.keys(data).sort()[0];
  const firstDayFmt  = firstDayKey
    ? new Date(firstDayKey+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})
    : null;

  // ── Rank row
  const RankRow=({app,h,i,total})=>(
    <div style={{display:'flex',alignItems:'center',gap:8}}>

      <AppIcon name={app} color={COLORS[i%10]} size={16} appImages={appImages}/>
      <span style={{fontSize:13,color:'var(--text-primary)',width:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0}}>{app}</span>
      <div style={{flex:1,height:5,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:3,background:COLORS[i%10],opacity:0.85,width:`${(h/stats.sorted[0][1])*100}%`}}/>
      </div>
      <span style={{fontSize:12,fontFamily:'Space Mono,monospace',color:'var(--text-primary)',width:46,textAlign:'right',flexShrink:0}}>{fmtH(h)}</span>
      <span style={{fontSize:11,color:'var(--text-muted)',width:32,textAlign:'right',flexShrink:0}}>{Math.round(h/total*100)}%</span>
    </div>
  );

  // ───────────────────────────────────────────────────────────────────────────
  return (
    <div style={S.root}>
      <Starfield/>

      {/* Header */}
      <header style={S.hdr}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',marginBottom:10}}>
          <div style={S.logo}>
            <span style={S.li}>◉</span>
            <span style={S.lt}>ScreenPulse</span>
          </div>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:'var(--accent)',letterSpacing:'0.08em',filter:'drop-shadow(0 0 6px rgba(77,150,255,0.8))'}}>v34</span>
        </div>
        <div style={{...S.tabs,overflowX:'auto',paddingBottom:2}}>
          {['week','stats','apps','images','calc','settings'].map(v=>(

              {v==='week'?'📅 Semaines':v==='stats'?'📊 Stats':v==='apps'?'📱 Apps':v==='images'?'🖼 Images':v==='calc'?'🧮 Calc':'⚙️ Réglages'}

        </div>
      </header>

      {/* ─── WEEK VIEW ─── */}
      {view==='week'&&(
        <main style={S.page}>

            </div>

          <div style={S.grid}>
            {weekData.map(d=>{
              const isTd=d.key===todayKey;
              const apps=Object.entries(d.apps).sort((a,b)=>b[1]-a[1]);
              const untr=Math.max(0,d.total-apps.reduce((a,[,h])=>a+h,0));
              const goalPct=showGoalBar?Math.min(100,(d.total/dailyGoal)*100):null;
              return (
                <div key={d.key} style={{...S.dc,...(isTd?S.dcT:{})}}>
                  <div style={S.dh}>
                    <div>
                      <div style={S.dn}>{fmtDate(d.date)} <span style={S.dy}>{fmtY(d.date)}</span></div>
                      <div style={S.dtv}>{fmtH(d.total)}</div>
                      {showGoalBar&&(
                        <div style={{fontSize:10,color:goalPct>=100?'var(--accent-green)':'var(--text-muted)',marginTop:2,fontFamily:'Space Mono,monospace'}}>

                        </div>

                    {isTd&&<span style={S.tb}>Auj.</span>}
                  </div>
                  <div style={S.pb}><div style={{...S.pf,width:`${Math.min(100,(d.total/16)*100)}%`,background:isTd?'var(--accent-green)':'var(--accent)'}}/></div>

                    <div style={{marginBottom:8}}>
                      <div style={{height:3,background:'rgba(255,255,255,0.04)',borderRadius:2,overflow:'hidden'}}>

                            onMouseEnter={e=>e.currentTarget.style.background=isActive?'rgba(77,150,255,0.16)':'rgba(255,255,255,0.04)'}
                            onMouseLeave={e=>e.currentTarget.style.background=isActive?'rgba(77,150,255,0.12)':'transparent'}

                  {appImages[focusedApp]

                  <div style={{fontSize:17,fontWeight:700,color:'var(--text-primary)',lineHeight:1.2}}>{focusedApp}</div>
                  <div style={{fontSize:11,color:'var(--accent)',marginTop:2,fontFamily:'Space Mono,monospace',letterSpacing:'0.05em'}}>ANALYSE DÉTAILLÉE</div>

              {/* Export JSON complet */}
              <button onClick={doFullExport}
                style={{width:'100%',padding:'12px',borderRadius:12,border:'1px solid rgba(107,203,119,0.3)',background:'rgba(107,203,119,0.08)',color:'var(--accent-green)',fontSize:13,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>

              </button>

            {/* Import */}

              </div>

              {/* ── Option 1 : sélection de fichier (recommandé) */}
              <label style={{display:'block',marginBottom:10}}>
                <div style={{width:'100%',padding:'14px',borderRadius:12,border:'2px dashed rgba(77,150,255,0.4)',background:'rgba(77,150,255,0.05)',color:'var(--accent)',fontSize:13,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontWeight:600,textAlign:'center',transition:'all 0.2s'}}>

                  onChange={e=>{ if(e.target.files[0]) handleImportFile(e.target.files[0]); e.target.value=''; }}/>

              {/* ── Option 2 : coller (fallback si fichier indispo) */}

                <summary style={{fontSize:11,color:'var(--text-muted)',cursor:'pointer',userSelect:'none',marginBottom:8}}>

                </summary>
                <textarea
                  style={{width:'100%',minHeight:80,background:'rgba(255,255,255,0.04)',border:`1px solid ${importStatus==='err'?'var(--accent-red)':importStatus==='ok'?'var(--accent-green)':'var(--border-modal)'}`,borderRadius:10,color:'var(--text-primary)',fontFamily:'monospace',fontSize:10,padding:'8px 10px',resize:'vertical',outline:'none',lineHeight:1.5,transition:'border 0.2s',marginTop:6}}

                  value={importText}
                  onChange={e=>{ setImportText(e.target.value); setImportStatus(null); }}
                />

                  style={{marginTop:8,width:'100%',padding:'9px',borderRadius:10,border:'none',background:importText.trim()?'var(--accent)':'rgba(255,255,255,0.06)',color:importText.trim()?'#fff':'var(--text-faint)',fontSize:13,cursor:importText.trim()?'pointer':'not-allowed',fontWeight:700,fontFamily:"'DM Sans',sans-serif",transition:'all 0.2s'}}>
                  Importer le JSON collé
                </button>
              </details>

              {/* Statuts */}
              {importStatus==='ok'&&(
                <div style={{padding:'10px 12px',borderRadius:10,background:'rgba(107,203,119,0.08)',border:'1px solid rgba(107,203,119,0.3)',fontSize:12,color:'var(--accent-green)',fontWeight:600}}>

                </div>

              {importStatus==='exported'&&(

            </div>
          </div>

          {/* ── PWA / INSTALLATION ─── */}
          <div style={S.card} className="settings-section">
            <SectionHeader icon="📲" title="Installer l'application"/>

            <div style={{padding:'14px',borderRadius:12,background:'rgba(77,150,255,0.06)',border:'1px solid rgba(77,150,255,0.25)',marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--text-primary)',marginBottom:6}}>Qu'est-ce que l'installation PWA ?</div>

                Une fois installée, ScreenPulse apparaît dans la liste de tes apps, s'ouvre en plein écran sans barre de navigation, et <strong style={{color:'var(--accent-green)'}}>est comptée séparément dans le temps d'écran de ta tablette</strong> comme une vraie appli.
              </div>
            </div>

            {/* Étapes d'installation */}
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>

                { n:'3', icon:'🏠', title:'Ajouter à l\'écran d\'accueil', desc:'Choisis "Ajouter à l\'écran d\'accueil" ou "Installer l\'application".' },

                    <div style={{fontSize:12,fontWeight:700,color:'var(--text-primary)',marginBottom:3}}>{s.title}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.5}}>{s.desc}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Bouton installer (si beforeinstallprompt disponible) */}
            <div id="sp-pwa-install-wrap">
              <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',lineHeight:1.6,padding:'8px 0'}}>

              </div>
            </div>

            <div style={{marginTop:12,padding:'10px 14px',borderRadius:10,background:'rgba(255,217,61,0.06)',border:'1px solid rgba(255,217,61,0.25)',fontSize:11,color:'var(--accent-yellow)',lineHeight:1.6}}>
              ⚠️ <strong>Important :</strong> Pour que ta tablette compte le temps sur ScreenPulse séparément, tu dois toujours lancer l'app depuis son icône sur l'écran d'accueil, et non depuis SPCK ou un navigateur.
            </div>
          </div>

          {/* ── DANGER ZONE ─── */}
          <div style={{...S.card,border:'1px solid rgba(255,107,107,0.2)'}} className="settings-section">
            <SectionHeader icon="⚠️" title="Zone dangereuse"/>
            {!resetConfirm&&!resetDone&&(
              <button onClick={()=>setResetConfirm(true)}
                style={{width:'100%',padding:'12px',borderRadius:12,border:'1px solid rgba(255,107,107,0.4)',background:'rgba(255,107,107,0.08)',color:'var(--accent-red)',fontSize:13,cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
                🗑 Effacer toutes les données
              </button>

                    <linearGradient id="wDot" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stopColor="#7de88a"/>

                  <line x1="128" y1="100" x2="146" y2="100" stroke="rgba(77,150,255,0.5)" strokeWidth="1.5" strokeLinecap="round"/>
                  <line x1="90"  y1="34"  x2="90"  y2="52"  stroke="rgba(77,150,255,0.5)" strokeWidth="1.5" strokeLinecap="round"/>
                  <line x1="90"  y1="148" x2="90"  y2="166" stroke="rgba(77,150,255,0.5)" strokeWidth="1.5" strokeLinecap="round"/>
                  {/* Dots axes */}
                  <circle cx="34"  cy="100" r="2" fill="#4d96ff" opacity="0.7"/>
                  <circle cx="146" cy="100" r="2" fill="#4d96ff" opacity="0.7"/>

                </svg>

              {/* Pills */}
              <div style={{display:'flex',justifyContent:'center',gap:16,marginBottom:18,flexWrap:'wrap'}}>
                {[{emoji:'🔒',text:'100% local'},{emoji:'📡',text:'Hors-ligne'},{emoji:'🚫',text:'Sans pub'}].map(({emoji,text})=>(
                  <div key={text} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>

            </div>
          </div>

        </main>
      )}

      {/* ─── All apps modal ─── */}
      {showAll&&(
        <div style={S.ov} onClick={()=>{setShowAll(false);setSearchApp('');}}>
          <div style={{...S.mo,maxWidth:520,maxHeight:'82vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>

                    <div key={app} style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:12,width:28,textAlign:'right',flexShrink:0,fontFamily:'Space Mono,monospace',color:'var(--text-muted)'}}>

                      <AppIcon name={app} color={COLORS[realIdx%10]} size={16} appImages={appImages}/>
                      <span style={{fontSize:13,color:'var(--text-primary)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{app}</span>
                      <div style={{width:80,height:5,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden',flexShrink:0}}>
                        <div style={{height:'100%',borderRadius:3,background:COLORS[realIdx%10],opacity:0.85,width:`${(h/stats.sorted[0][1])*100}%`}}/>

                      <span style={{fontSize:12,fontFamily:'Space Mono,monospace',color:'var(--text-primary)',width:46,textAlign:'right',flexShrink:0}}>{fmtH(h)}</span>

              </div>

      {/* ─── Time/App modal ─── */}
      {modal&&(
        <div style={S.ov} onClick={()=>setModal(null)}>
          <div style={S.mo} onClick={e=>e.stopPropagation()}>
            <div style={S.mt}>{modal.mode==='add'?'⏱ Modifier le temps':'📱 Ajouter une app'}</div>
            <div style={S.msub}>{fmtDate(modal.date)} {fmtY(modal.date)}</div>
            {modal.mode==='add'&&(
              <>
                <div style={{display:'flex',gap:10,marginBottom:18}}>
                  <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="23" placeholder="0" value={inputH} onChange={e=>setInputH(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>h</span></div>
                  <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}><input style={S.inp} type="number" min="0" max="59" placeholder="0" value={inputM} onChange={e=>setInputM(e.target.value)}/><span style={{fontSize:13,color:'var(--text-muted)',flexShrink:0}}>min</span></div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button style={{...S.btn,...S.btnG}} onClick={()=>doTime(true)}>+ Ajouter</button>
                  <button style={{...S.btn,...S.btnR}} onClick={()=>doTime(false)}>− Retirer</button>
                  <button style={S.btn} onClick={()=>setModal(null)}>Annuler</button>

<script>
// ── PWA : Service Worker ──────────────────────────────────────────────────────
// Note : le SW enregistré via blob URL fonctionne pour le cache hors-ligne,
// mais ne persiste pas entre sessions comme un SW servi par HTTPS.
// Pour une installation PWA complète, héberge le fichier via GitHub Pages / Netlify.
if ('serviceWorker' in navigator) {
  const SW = `
const CACHE = 'screenpulse-v33';
const ASSETS = [
  'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
  'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
  'https://unpkg.com/@babel/standalone@7.29.7/babel.min.js',
  'https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE)
      .then(c => Promise.allSettled(ASSETS.map(u => c.add(new Request(u, {mode:'no-cors'})))))
      .then(() => self.skipWaiting())
  );
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys()
      .then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))
      .then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('', {status: 503})))
  );
});
`;
  try {
    const blob = new Blob([SW], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
  } catch(e) {}
}

// ── PWA : Manifest avec icône PNG embarquée (base64) ─────────────────────────
// Une icône PNG est nécessaire pour que Chrome/Android accepte l'installation PWA.
// On génère l'icône à la volée via Canvas.
(function() {
  function makeIcon(size) {
    try {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      // Fond arrondi
      const r = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
      ctx.arcTo(size,0,size,r,r); ctx.lineTo(size,size-r);
      ctx.arcTo(size,size,size-r,size,r); ctx.lineTo(r,size);
      ctx.arcTo(0,size,0,size-r,r); ctx.lineTo(0,r);
      ctx.arcTo(0,0,r,0,r); ctx.closePath();
      ctx.fillStyle = '#080c14'; ctx.fill();
      // Cercle extérieur
      ctx.beginPath();
      ctx.arc(size/2, size/2, size*0.35, 0, Math.PI*2);
      ctx.strokeStyle = '#4d96ff'; ctx.lineWidth = size*0.08; ctx.stroke();
      // Point central
      ctx.beginPath();
      ctx.arc(size/2, size/2, size*0.11, 0, Math.PI*2);
      ctx.fillStyle = '#4d96ff'; ctx.fill();
      return c.toDataURL('image/png');
    } catch(e) { return null; }
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);

  const icons = [];
  if (icon192) icons.push({ src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' });
  if (icon512) icons.push({ src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' });
  // Fallback SVG si canvas échoue
  icons.push({
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23080c14'/><circle cx='96' cy='96' r='67' fill='none' stroke='%234d96ff' stroke-width='14'/><circle cx='96' cy='96' r='22' fill='%234d96ff'/></svg>",
    sizes: '192x192', type: 'image/svg+xml'
  });

  const manifest = {
    name: 'ScreenPulse',
    short_name: 'ScreenPulse',
    description: 'Tracker de temps d\'écran personnel',
    start_url: location.href,
    scope: location.href,
    display: 'standalone',
    orientation: 'any',
    background_color: '#080c14',
    theme_color: '#080c14',
    lang: 'fr',
    categories: ['productivity', 'utilities'],
    icons
  };

  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const link = document.createElement('link');
    link.rel  = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch(e) {}
})();

// ── PWA : Gérer le prompt d'installation ────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window.__spInstallPrompt = e;
  // Afficher un bouton dans la section PWA des réglages si elle est visible
  const wrap = document.getElementById('sp-pwa-install-wrap');
  if (wrap) {
    wrap.innerHTML = '';
    const btn = document.createElement('button');
    btn.textContent = '📲 Installer ScreenPulse maintenant';
    btn.style.cssText = 'width:100%;padding:14px;border-radius:12px;border:none;background:#4d96ff;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:DM Sans,sans-serif;margin-top:4px;';
    btn.onclick = () => {
      e.prompt();
      e.userChoice.then(r => {
        if (r.outcome === 'accepted') {
          btn.textContent = '✅ Installation lancée !';
          btn.style.background = '#6bcb77';
          btn.disabled = true;
        }
      });
    };
    wrap.appendChild(btn);
  }
});

window.addEventListener('appinstalled', () => {
  const wrap = document.getElementById('sp-pwa-install-wrap');
  if (wrap) wrap.innerHTML = '<div style="padding:10px 12px;border-radius:10px;background:rgba(107,203,119,0.1);border:1px solid rgba(107,203,119,0.3);color:#6bcb77;font-size:12px;font-weight:700;text-align:center;">✅ ScreenPulse est installée sur ta tablette !</div>';
});
</script>
