<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AniTrack">
<meta name="description" content="Suivez vos animes préférés">
<title>AniTrack</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg-primary: #0d0d14;
    --bg-secondary: #13131f;
    --bg-card: #1a1a2e;
    --bg-elevated: #1f1f35;
    --accent: #6c63ff;
    --accent-glow: rgba(108,99,255,0.18);
    --accent-secondary: #ff6b6b;
    --accent-green: #22d3a5;
    --accent-amber: #fbbf24;
    --text-primary: #f0f0ff;
    --text-secondary: #9090b0;
    --text-muted: #5a5a7a;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.13);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;
    --nav-height: 68px;
    --header-height: 60px;
    --transition: 0.2s ease;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overscroll-behavior: none;
  }
  #app { display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border-hover); border-radius:2px; }

  /* ── Header ── */
  .header {
    height: var(--header-height);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px;
    background:var(--bg-primary);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    position:relative;
    z-index:10;
  }
  .header-title { font-size:20px; font-weight:700; letter-spacing:-0.5px; }
  .header-title span { color:var(--accent); }
  .header-actions { display:flex; gap:8px; }
  .icon-btn {
    width:38px; height:38px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text-secondary);
    font-size:18px; transition:var(--transition);
  }
  .icon-btn:hover { background:var(--bg-elevated); color:var(--text-primary); border-color:var(--border-hover); }
  .icon-btn svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* ── Pages ── */
  .pages { flex:1; overflow:hidden; position:relative; }
  .page { 
    position:absolute; inset:0;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:16px 16px calc(var(--nav-height) + 16px);
    display:none; animation:fadeIn 0.2s ease;
  }
  .page.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  /* ── Bottom Nav ── */
  .bottom-nav {
    height: var(--nav-height);
    background:var(--bg-secondary);
    border-top:1px solid var(--border);
    display:flex; align-items:stretch;
    flex-shrink:0;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:4px; cursor:pointer; color:var(--text-muted);
    font-size:11px; font-weight:500; letter-spacing:0.2px;
    transition:var(--transition); border:none; background:none;
    -webkit-appearance:none;
  }
  .nav-item svg { width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; transition:var(--transition); }
  .nav-item.active { color:var(--accent); }
  .nav-item.active svg { stroke:var(--accent); }
  .nav-badge {
    position:absolute; top:2px; right:4px;
    background:var(--accent-secondary); color:#fff;
    font-size:9px; font-weight:700; min-width:16px; height:16px;
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    padding:0 4px;
  }
  .nav-icon-wrap { position:relative; }

  /* ── Search bar ── */
  .search-wrap { position:relative; margin-bottom:16px; }
  .search-input {
    width:100%; height:44px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:0 16px 0 42px;
    color:var(--text-primary);
    font-size:15px;
    outline:none; transition:var(--transition);
    -webkit-appearance:none;
  }
  .search-input::placeholder { color:var(--text-muted); }
  .search-input:focus { border-color:var(--accent); background:var(--bg-elevated); }
  .search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }
  .search-icon svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* ── Category tabs ── */
  .tabs { display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    flex-shrink:0; padding:7px 16px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:20px;
    font-size:13px; font-weight:500;
    color:var(--text-secondary);
    cursor:pointer; transition:var(--transition);
    display:flex; align-items:center; gap:6px;
  }
  .tab .count {
    background:var(--bg-elevated);
    color:var(--text-muted);
    font-size:11px; font-weight:600;
    padding:1px 7px; border-radius:10px;
    min-width:22px; text-align:center;
  }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .tab.active .count { background:rgba(255,255,255,0.2); color:#fff; }

  /* ── Anime cards ── */
  .anime-grid { display:flex; flex-direction:column; gap:12px; }
  .anime-card {
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    display:flex; gap:12px;
    padding:12px;
    transition:var(--transition);
    position:relative; overflow:hidden;
  }
  .anime-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--accent);
  }
  .anime-card.category-watching::before { background:var(--accent); }
  .anime-card.category-completed::before { background:var(--accent-green); }
  .anime-card.category-plan::before { background:var(--accent-amber); }
  .anime-card:hover { border-color:var(--border-hover); background:var(--bg-elevated); }
  .anime-poster {
    width:64px; height:90px; object-fit:cover;
    border-radius:var(--radius-sm); flex-shrink:0;
    background:var(--bg-elevated);
  }
  .anime-poster-placeholder {
    width:64px; height:90px;
    background:var(--bg-elevated);
    border-radius:var(--radius-sm); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-muted); font-size:22px;
  }
  .anime-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; justify-content:space-between; }
  .anime-title { font-size:14px; font-weight:600; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .anime-meta { font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .anime-meta-dot { width:3px; height:3px; border-radius:50%; background:var(--text-muted); }
  .progress-area { display:flex; flex-direction:column; gap:6px; }
  .progress-row { display:flex; align-items:center; gap:8px; }
  .progress-bar {
    flex:1; height:4px; background:var(--bg-elevated);
    border-radius:2px; overflow:hidden;
  }
  .progress-fill {
    height:100%; border-radius:2px;
    background:var(--accent);
    transition:width 0.4s ease;
  }
  .category-completed .progress-fill { background:var(--accent-green); }
  .category-plan .progress-fill { background:var(--accent-amber); }
  .progress-text { font-size:11px; color:var(--text-secondary); white-space:nowrap; font-weight:500; }
  .ep-controls { display:flex; align-items:center; gap:6px; }
  .ep-btn {
    width:28px; height:28px; border-radius:50%;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; font-weight:700;
    transition:var(--transition); flex-shrink:0;
  }
  .ep-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
  .ep-display { font-size:13px; font-weight:600; min-width:50px; text-align:center; }
  .card-actions { display:flex; gap:6px; margin-left:auto; }
  .card-action-btn {
    width:28px; height:28px;
    background:transparent; border:none;
    color:var(--text-muted); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    border-radius:6px; transition:var(--transition);
  }
  .card-action-btn:hover { color:var(--text-primary); background:var(--bg-elevated); }
  .card-action-btn svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .category-badge {
    display:inline-flex; align-items:center; gap:4px;
    font-size:10px; font-weight:700; letter-spacing:0.4px;
    padding:2px 8px; border-radius:10px;
    text-transform:uppercase;
  }
  .badge-watching { background:rgba(108,99,255,0.18); color:var(--accent); }
  .badge-completed { background:rgba(34,211,165,0.15); color:var(--accent-green); }
  .badge-plan { background:rgba(251,191,36,0.15); color:var(--accent-amber); }

  /* ── Empty state ── */
  .empty-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:60px 20px; gap:12px; text-align:center;
  }
  .empty-state-icon { font-size:48px; opacity:0.4; }
  .empty-state-title { font-size:16px; font-weight:600; color:var(--text-secondary); }
  .empty-state-sub { font-size:13px; color:var(--text-muted); }

  /* ── FAB ── */
  .fab {
    position:fixed;
    bottom:calc(var(--nav-height) + 16px);
    right:16px;
    width:52px; height:52px;
    background:var(--accent);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 4px 20px rgba(108,99,255,0.45);
    transition:var(--transition); z-index:50;
    border:none; color:#fff;
  }
  .fab:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(108,99,255,0.55); }
  .fab:active { transform:scale(0.96); }
  .fab svg { width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

  /* ── Modal ── */
  .modal-overlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.72);
    display:flex; align-items:flex-end;
    animation:overlayIn 0.2s ease;
  }
  @keyframes overlayIn { from { opacity:0; } to { opacity:1; } }
  .modal {
    background:var(--bg-secondary);
    border-radius:var(--radius-xl) var(--radius-xl) 0 0;
    width:100%; max-height:90vh;
    overflow-y:auto; padding:0 0 env(safe-area-inset-bottom);
    animation:sheetIn 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes sheetIn { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-handle { width:36px; height:4px; background:var(--text-muted); border-radius:2px; margin:12px auto; opacity:0.4; }
  .modal-header { padding:0 20px 16px; display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-size:18px; font-weight:700; }
  .modal-close {
    width:32px; height:32px; background:var(--bg-card); border:none;
    border-radius:50%; color:var(--text-muted); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    transition:var(--transition);
  }
  .modal-close:hover { color:var(--text-primary); background:var(--bg-elevated); }
  .modal-body { padding:0 20px 24px; }
  .form-group { margin-bottom:16px; }
  .form-label { display:block; font-size:13px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
  .form-input, .form-select {
    width:100%; height:44px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:0 14px; color:var(--text-primary);
    font-size:15px; outline:none;
    transition:var(--transition); -webkit-appearance:none;
  }
  .form-input:focus, .form-select:focus { border-color:var(--accent); background:var(--bg-elevated); }
  .form-select { cursor:pointer; }
  option { background:var(--bg-secondary); }
  .form-input::placeholder { color:var(--text-muted); }
  .btn-primary {
    width:100%; height:48px;
    background:var(--accent); border:none;
    border-radius:var(--radius-md); color:#fff;
    font-size:16px; font-weight:600; cursor:pointer;
    transition:var(--transition); -webkit-appearance:none;
  }
  .btn-primary:hover { opacity:0.9; }
  .btn-primary:active { transform:scale(0.98); }
  .btn-danger {
    width:100%; height:44px;
    background:rgba(255,107,107,0.12); border:1px solid rgba(255,107,107,0.3);
    border-radius:var(--radius-md); color:var(--accent-secondary);
    font-size:15px; font-weight:600; cursor:pointer;
    transition:var(--transition); -webkit-appearance:none; margin-top:8px;
  }
  .btn-danger:hover { background:rgba(255,107,107,0.2); }

  /* ── Search results in modal ── */
  .search-results { display:flex; flex-direction:column; gap:10px; max-height:320px; overflow-y:auto; }
  .search-result-item {
    display:flex; gap:12px; padding:10px;
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius-md); cursor:pointer; transition:var(--transition);
  }
  .search-result-item:hover { border-color:var(--accent); background:var(--bg-elevated); }
  .search-result-img { width:44px; height:62px; object-fit:cover; border-radius:6px; background:var(--bg-elevated); }
  .search-result-info { flex:1; min-width:0; }
  .search-result-title { font-size:14px; font-weight:600; margin-bottom:4px; }
  .search-result-meta { font-size:12px; color:var(--text-muted); }
  .loading-spinner {
    display:flex; justify-content:center; padding:24px;
    color:var(--text-muted); font-size:13px;
  }
  .spinner {
    width:20px; height:20px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite; margin-right:10px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Page Nouveautés / Sorties ── */
  .section-header { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; margin-top:20px; }
  .section-header:first-child { margin-top:0; }
  .news-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius-lg); overflow:hidden; margin-bottom:12px;
    transition:var(--transition);
  }
  .news-card:hover { border-color:var(--border-hover); }
  .news-card-img { width:100%; height:140px; object-fit:cover; background:var(--bg-elevated); }
  .news-card-img-placeholder { width:100%; height:140px; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:36px; }
  .news-card-body { padding:12px; }
  .news-card-title { font-size:14px; font-weight:600; margin-bottom:4px; }
  .news-card-meta { font-size:12px; color:var(--text-muted); }
  .upcoming-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:12px;
    display:flex; gap:12px; align-items:center; margin-bottom:10px;
    transition:var(--transition);
  }
  .upcoming-card:hover { border-color:var(--border-hover); }
  .upcoming-poster { width:48px; height:68px; object-fit:cover; border-radius:6px; background:var(--bg-elevated); flex-shrink:0; }
  .upcoming-poster-placeholder { width:48px; height:68px; background:var(--bg-elevated); border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:18px; }
  .upcoming-info { flex:1; min-width:0; }
  .upcoming-title { font-size:14px; font-weight:600; margin-bottom:4px; }
  .upcoming-ep { font-size:12px; color:var(--text-muted); }
  .upcoming-date {
    text-align:right; flex-shrink:0;
  }
  .upcoming-date-num { font-size:20px; font-weight:700; color:var(--accent); line-height:1; }
  .upcoming-date-str { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }

  /* ── Profil ── */
  .profile-header {
    display:flex; flex-direction:column; align-items:center;
    padding:24px 0 16px; text-align:center;
  }
  .profile-avatar {
    width:72px; height:72px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), #a855f7);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:700; color:#fff; margin-bottom:12px;
    box-shadow:0 4px 20px rgba(108,99,255,0.35);
  }
  .profile-name { font-size:20px; font-weight:700; margin-bottom:4px; }
  .profile-since { font-size:13px; color:var(--text-muted); }
  .stats-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; margin-bottom:16px; }
  .stat-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:14px 16px;
    transition:var(--transition);
  }
  .stat-card:hover { border-color:var(--border-hover); }
  .stat-value { font-size:26px; font-weight:700; line-height:1; margin-bottom:4px; }
  .stat-label { font-size:12px; color:var(--text-muted); font-weight:500; }
  .stat-card.accent .stat-value { color:var(--accent); }
  .stat-card.green .stat-value { color:var(--accent-green); }
  .stat-card.amber .stat-value { color:var(--accent-amber); }
  .stat-card.red .stat-value { color:var(--accent-secondary); }
  .wide-stat {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:14px 16px;
    margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;
  }
  .wide-stat-label { font-size:13px; color:var(--text-secondary); }
  .wide-stat-value { font-size:14px; font-weight:600; color:var(--text-primary); }
  .recent-anime {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:14px 16px;
    margin-bottom:10px; display:flex; gap:12px; align-items:center;
  }
  .recent-anime img { width:42px; height:60px; object-fit:cover; border-radius:6px; background:var(--bg-elevated); }
  .recent-anime-placeholder { width:42px; height:60px; background:var(--bg-elevated); border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:16px; }
  .recent-label { font-size:11px; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }

  /* ── Toast ── */
  .toast {
    position:fixed; bottom:calc(var(--nav-height) + 16px); left:50%;
    transform:translateX(-50%) translateY(0);
    background:var(--bg-elevated); border:1px solid var(--border-hover);
    border-radius:var(--radius-md); padding:12px 20px;
    font-size:14px; font-weight:500; color:var(--text-primary);
    z-index:200; white-space:nowrap;
    animation:toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    display:flex; align-items:center; gap:8px;
  }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(12px); } }
  .toast-dot { width:8px; height:8px; border-radius:50%; background:var(--accent-green); }
  .toast-dot.warn { background:var(--accent-amber); }
  .toast-dot.err { background:var(--accent-secondary); }

  /* ── Skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
    background-size:200% 100%;
    animation:shimmer 1.5s infinite; border-radius:4px;
  }
  @keyframes shimmer { from { background-position:200% 0; } to { background-position:-200% 0; } }

  /* ── Responsive desktop ── */
  @media (min-width:640px) {
    .stats-grid { grid-template-columns:repeat(3, 1fr); }
    .anime-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; }
    .anime-card { flex-direction:column; }
    .anime-poster, .anime-poster-placeholder { width:100%; height:160px; }
    .fab { bottom:calc(var(--nav-height) + 24px); right:24px; }
  }
  @media (min-width:1024px) {
    body { display:flex; justify-content:center; }
    #app { width:100%; max-width:480px; margin:0 auto; box-shadow:0 0 60px rgba(0,0,0,0.5); }
    .bottom-nav { display:flex; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-title">Ani<span>Track</span></div>
    <div class="header-actions">
      <button class="icon-btn" id="searchToggleBtn" aria-label="Rechercher">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </header>

  <!-- Pages -->
  <div class="pages">
    <!-- ── Page Bibliothèque ── -->
    <div class="page active" id="page-library">
      <div class="search-wrap" id="librarySearch" style="display:none">
        <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <input class="search-input" id="librarySearchInput" placeholder="Filtrer ma bibliothèque…" type="search">
      </div>
      <div class="tabs" id="categoryTabs">
        <button class="tab active" data-cat="all">Tous <span class="count" id="cnt-all">0</span></button>
        <button class="tab" data-cat="watching">En cours <span class="count" id="cnt-watching">0</span></button>
        <button class="tab" data-cat="completed">Vus <span class="count" id="cnt-completed">0</span></button>
        <button class="tab" data-cat="plan">En attente <span class="count" id="cnt-plan">0</span></button>
      </div>
      <div class="anime-grid" id="animeGrid"></div>
    </div>

    <!-- ── Page Nouveautés ── -->
    <div class="page" id="page-news">
      <div class="section-header">Récemment sorties</div>
      <div id="recentContainer"></div>
      <div class="section-header">Saison en cours</div>
      <div id="seasonContainer"></div>
    </div>

    <!-- ── Page Prochaines sorties ── -->
    <div class="page" id="page-upcoming">
      <div class="section-header">Prochains épisodes</div>
      <div id="upcomingContainer">
        <div class="empty-state">
          <div class="empty-state-icon">📅</div>
          <div class="empty-state-title">Aucun anime en cours</div>
          <div class="empty-state-sub">Ajoutez des animes en cours pour voir leurs prochains épisodes</div>
        </div>
      </div>
    </div>

    <!-- ── Page Profil ── -->
    <div class="page" id="page-profile">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">🎌</div>
        <div class="profile-name">Mon Profil</div>
        <div class="profile-since" id="profileSince">Membre depuis aujourd'hui</div>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="section-header">Temps de visionnage</div>
      <div id="timeStats"></div>
      <div class="section-header">Activité récente</div>
      <div id="recentActivity"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="library">
      <span class="nav-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </span>
      Bibliothèque
    </button>
    <button class="nav-item" data-page="news">
      <span class="nav-icon-wrap">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </span>
      Nouveautés
    </button>
    <button class="nav-item" data-page="upcoming">
      <span class="nav-icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </span>
      Agenda
    </button>
    <button class="nav-item" data-page="profile">
      <span class="nav-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      Profil
    </button>
  </nav>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" aria-label="Ajouter un anime">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Modal Ajouter Anime -->
<div class="modal-overlay" id="addModal" style="display:none" role="dialog" aria-modal="true" aria-label="Ajouter un anime">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Ajouter un anime</div>
      <button class="modal-close" id="closeAddModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Rechercher un anime</label>
        <div class="search-wrap" style="margin-bottom:10px">
          <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
          <input class="search-input" id="animeSearchInput" placeholder="Titre de l'anime…" type="search" autocomplete="off">
        </div>
        <div id="searchResultsContainer"></div>
      </div>
      <div id="selectedAnimeForm" style="display:none">
        <div class="form-group">
          <label class="form-label">Catégorie</label>
          <select class="form-select" id="animeCategory">
            <option value="watching">En cours</option>
            <option value="plan">En attente</option>
            <option value="completed">Vu</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Épisodes vus</label>
          <input class="form-input" type="number" id="animeEpWatched" min="0" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">Durée moyenne d'un épisode (minutes)</label>
          <input class="form-input" type="number" id="animeEpDuration" min="1" max="120" value="24">
        </div>
        <button class="btn-primary" id="confirmAddAnime">Ajouter à ma liste</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Éditer Anime -->
<div class="modal-overlay" id="editModal" style="display:none" role="dialog" aria-modal="true" aria-label="Modifier l'anime">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Modifier</div>
      <button class="modal-close" id="closeEditModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select class="form-select" id="editCategory"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Épisodes vus</label>
        <input class="form-input" type="number" id="editEpWatched" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Durée par épisode (min)</label>
        <input class="form-input" type="number" id="editEpDuration" min="1" max="120">
      </div>
      <button class="btn-primary" id="saveEditAnime">Enregistrer</button>
      <button class="btn-danger" id="deleteAnime">Supprimer</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════
const STORAGE_KEY = 'anitrack_v2';
const JOINED_KEY = 'anitrack_joined';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { animes:[] }; }
  catch { return { animes:[] }; }
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let DB = loadData();
if (!localStorage.getItem(JOINED_KEY)) localStorage.setItem(JOINED_KEY, new Date().toISOString());

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════
let currentPage = 'library';
const navItems = document.querySelectorAll('.nav-item');
const pages = { library:document.getElementById('page-library'), news:document.getElementById('page-news'), upcoming:document.getElementById('page-upcoming'), profile:document.getElementById('page-profile') };

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  pages[page].classList.add('active');
  navItems.forEach(n => n.classList.toggle('active', n.dataset.page === page));
  currentPage = page;
  document.getElementById('fabBtn').style.display = page === 'library' ? 'flex' : 'none';
  if (page === 'profile') renderProfile();
  if (page === 'upcoming') renderUpcoming();
  if (page === 'news') renderNews();
}

navItems.forEach(n => n.addEventListener('click', () => goTo(n.dataset.page)));

// ════════════════════════════════════════════
//  SEARCH TOGGLE (HEADER)
// ════════════════════════════════════════════
const librarySearch = document.getElementById('librarySearch');
const librarySearchInput = document.getElementById('librarySearchInput');
document.getElementById('searchToggleBtn').addEventListener('click', () => {
  const vis = librarySearch.style.display === 'none';
  librarySearch.style.display = vis ? 'block' : 'none';
  if (vis) librarySearchInput.focus();
  else { librarySearchInput.value=''; renderLibrary(currentCat); }
});
librarySearchInput.addEventListener('input', () => renderLibrary(currentCat, librarySearchInput.value));

// ════════════════════════════════════════════
//  LIBRARY PAGE
// ════════════════════════════════════════════
let currentCat = 'all';
const tabs = document.querySelectorAll('#categoryTabs .tab');
tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  currentCat = t.dataset.cat;
  renderLibrary(currentCat, librarySearchInput.value);
}));

function renderLibrary(cat = 'all', filter = '') {
  const grid = document.getElementById('animeGrid');
  const all = DB.animes;
  const counts = { all:all.length, watching:0, completed:0, plan:0 };
  all.forEach(a => { if (counts[a.category] !== undefined) counts[a.category]++; });
  Object.keys(counts).forEach(k => { const el = document.getElementById('cnt-'+k); if(el) el.textContent = counts[k]; });

  let list = cat === 'all' ? all : all.filter(a => a.category === cat);
  if (filter) {
    const q = filter.toLowerCase();
    list = list.filter(a => a.title.toLowerCase().includes(q));
  }
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">${cat==='watching'?'▶️':cat==='completed'?'✅':cat==='plan'?'📋':'📺'}</div><div class="empty-state-title">${filter?'Aucun résultat':'Liste vide'}</div><div class="empty-state-sub">${filter?'Essayez un autre terme':cat==='all'?'Appuyez sur + pour ajouter un anime':'Aucun anime dans cette catégorie'}</div></div>`;
    return;
  }
  grid.innerHTML = list.map(a => animeCardHTML(a)).join('');
  grid.querySelectorAll('.ep-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.closest('.anime-card').dataset.id;
      const delta = btn.dataset.dir === 'up' ? 1 : -1;
      changeEp(id, delta);
    });
  });
  grid.querySelectorAll('.card-action-btn[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); openEditModal(btn.closest('.anime-card').dataset.id); });
  });
}

function animeCardHTML(a) {
  const total = a.totalEpisodes || '?';
  const watched = a.episodesWatched || 0;
  const pct = total === '?' ? 0 : Math.round((watched/total)*100);
  const catLabel = { watching:'En cours', completed:'Vu', plan:'En attente' };
  const imgEl = a.image
    ? `<img class="anime-poster" src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'anime-poster-placeholder\\'>📺</div>'">`
    : `<div class="anime-poster-placeholder">📺</div>`;
  return `<div class="anime-card category-${a.category}" data-id="${a.id}">
    ${imgEl}
    <div class="anime-info">
      <div>
        <div class="anime-title">${a.title}</div>
        <div class="anime-meta">
          <span class="category-badge badge-${a.category}">${catLabel[a.category]}</span>
          ${a.year ? `<span class="anime-meta-dot"></span><span>${a.year}</span>` : ''}
          ${a.genres?.length ? `<span class="anime-meta-dot"></span><span>${a.genres[0]}</span>` : ''}
        </div>
      </div>
      <div class="progress-area">
        <div class="progress-row">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-text">${pct}%</div>
        </div>
        <div class="ep-controls">
          <button class="ep-btn" data-dir="down" aria-label="Épisode précédent">−</button>
          <div class="ep-display">${watched} / ${total}</div>
          <button class="ep-btn" data-dir="up" aria-label="Épisode suivant">+</button>
          <div class="card-actions">
            <button class="card-action-btn" data-action="edit" aria-label="Modifier">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function changeEp(id, delta) {
  const a = DB.animes.find(x => x.id === id);
  if (!a) return;
  const max = a.totalEpisodes || 9999;
  a.episodesWatched = Math.max(0, Math.min(max, (a.episodesWatched || 0) + delta));
  a.lastWatched = new Date().toISOString();
  if (a.episodesWatched === max && a.category === 'watching') {
    a.category = 'completed';
    showToast('✅ Terminé !');
  }
  saveData(DB);
  renderLibrary(currentCat, librarySearchInput.value);
}

// ════════════════════════════════════════════
//  ADD MODAL + SEARCH
// ════════════════════════════════════════════
const addModal = document.getElementById('addModal');
let selectedAnime = null;
let searchTimeout = null;

document.getElementById('fabBtn').addEventListener('click', () => { addModal.style.display='flex'; document.getElementById('animeSearchInput').focus(); });
document.getElementById('closeAddModal').addEventListener('click', closeAddModal);
addModal.addEventListener('click', e => { if(e.target===addModal) closeAddModal(); });

function closeAddModal() {
  addModal.style.display = 'none';
  document.getElementById('animeSearchInput').value = '';
  document.getElementById('searchResultsContainer').innerHTML = '';
  document.getElementById('selectedAnimeForm').style.display = 'none';
  selectedAnime = null;
}

document.getElementById('animeSearchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (!q) { document.getElementById('searchResultsContainer').innerHTML=''; return; }
  document.getElementById('searchResultsContainer').innerHTML = `<div class="loading-spinner"><div class="spinner"></div> Recherche en cours…</div>`;
  searchTimeout = setTimeout(() => searchAnime(q), 600);
});

async function searchAnime(q) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=8&sfw=true`);
    const data = await res.json();
    renderSearchResults(data.data || []);
  } catch {
    document.getElementById('searchResultsContainer').innerHTML = `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px">Erreur réseau. Essayez plus tard.</div>`;
  }
}

function renderSearchResults(results) {
  const cont = document.getElementById('searchResultsContainer');
  if (!results.length) { cont.innerHTML=`<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px">Aucun résultat trouvé</div>`; return; }
  cont.innerHTML = `<div class="search-results">${results.map(r => `
    <div class="search-result-item" data-malid="${r.mal_id}">
      <img class="search-result-img" src="${r.images?.jpg?.image_url||''}" alt="${r.title}" onerror="this.style.display='none'">
      <div class="search-result-info">
        <div class="search-result-title">${r.title}</div>
        <div class="search-result-meta">${r.episodes ? r.episodes+' épisodes' : '? épisodes'} · ${r.year||'?'} · ${r.genres?.map(g=>g.name).slice(0,2).join(', ')||'Anime'}</div>
      </div>
    </div>`).join('')}</div>`;
  cont.querySelectorAll('.search-result-item').forEach((el, i) => {
    el.addEventListener('click', () => selectAnime(results[i]));
  });
}

function selectAnime(r) {
  selectedAnime = {
    id: 'anime_' + Date.now(),
    malId: r.mal_id,
    title: r.title,
    image: r.images?.jpg?.large_image_url || r.images?.jpg?.image_url || null,
    totalEpisodes: r.episodes || null,
    year: r.year || null,
    genres: r.genres?.map(g=>g.name) || [],
    score: r.score || null,
    episodesWatched: 0,
    category: 'watching',
    epDuration: 24,
    addedAt: new Date().toISOString(),
    lastWatched: null
  };
  document.getElementById('animeSearchInput').value = r.title;
  document.getElementById('searchResultsContainer').innerHTML = '';
  document.getElementById('animeEpWatched').max = r.episodes || 9999;
  document.getElementById('animeEpWatched').value = 0;
  document.getElementById('selectedAnimeForm').style.display = 'block';
}

document.getElementById('confirmAddAnime').addEventListener('click', () => {
  if (!selectedAnime) return;
  if (DB.animes.find(a => a.malId === selectedAnime.malId)) { showToast('Déjà dans ta liste', 'warn'); return; }
  selectedAnime.category = document.getElementById('animeCategory').value;
  selectedAnime.episodesWatched = parseInt(document.getElementById('animeEpWatched').value) || 0;
  selectedAnime.epDuration = parseInt(document.getElementById('animeEpDuration').value) || 24;
  DB.animes.unshift(selectedAnime);
  saveData(DB);
  closeAddModal();
  renderLibrary(currentCat);
  showToast('✨ Ajouté à ta liste !');
});

// ════════════════════════════════════════════
//  EDIT MODAL
// ════════════════════════════════════════════
const editModal = document.getElementById('editModal');
let editingId = null;

document.getElementById('closeEditModal').addEventListener('click', closeEditModal);
editModal.addEventListener('click', e => { if(e.target===editModal) closeEditModal(); });

function closeEditModal() { editModal.style.display='none'; editingId=null; }

function openEditModal(id) {
  const a = DB.animes.find(x => x.id===id);
  if (!a) return;
  editingId = id;
  const sel = document.getElementById('editCategory');
  sel.innerHTML = ['watching','plan','completed'].map(c => `<option value="${c}" ${a.category===c?'selected':''}>${{watching:'En cours',plan:'En attente',completed:'Vu'}[c]}</option>`).join('');
  document.getElementById('editEpWatched').value = a.episodesWatched || 0;
  document.getElementById('editEpWatched').max = a.totalEpisodes || 9999;
  document.getElementById('editEpDuration').value = a.epDuration || 24;
  editModal.style.display = 'flex';
}

document.getElementById('saveEditAnime').addEventListener('click', () => {
  const a = DB.animes.find(x => x.id===editingId);
  if (!a) return;
  a.category = document.getElementById('editCategory').value;
  a.episodesWatched = parseInt(document.getElementById('editEpWatched').value) || 0;
  a.epDuration = parseInt(document.getElementById('editEpDuration').value) || 24;
  a.lastWatched = new Date().toISOString();
  saveData(DB);
  closeEditModal();
  renderLibrary(currentCat);
  showToast('Modifications enregistrées');
});

document.getElementById('deleteAnime').addEventListener('click', () => {
  if (!confirm('Supprimer cet anime de ta liste ?')) return;
  DB.animes = DB.animes.filter(x => x.id !== editingId);
  saveData(DB);
  closeEditModal();
  renderLibrary(currentCat);
  showToast('Supprimé', 'warn');
});

// ════════════════════════════════════════════
//  NEWS PAGE
// ════════════════════════════════════════════
let newsLoaded = false;
async function renderNews() {
  if (newsLoaded) return;
  newsLoaded = true;
  const recentCont = document.getElementById('recentContainer');
  const seasonCont = document.getElementById('seasonContainer');
  recentCont.innerHTML = '<div class="loading-spinner"><div class="spinner"></div> Chargement…</div>';
  seasonCont.innerHTML = '<div class="loading-spinner"><div class="spinner"></div> Chargement…</div>';
  try {
    const [recentRes, seasonRes] = await Promise.all([
      fetch('https://api.jikan.moe/v4/anime?order_by=start_date&sort=desc&limit=6&type=TV&sfw=true'),
      fetch('https://api.jikan.moe/v4/seasons/now?limit=8&sfw=true')
    ]);
    const recentData = await recentRes.json();
    const seasonData = await seasonRes.json();
    recentCont.innerHTML = (recentData.data||[]).map(a => newsCardHTML(a)).join('');
    seasonCont.innerHTML = (seasonData.data||[]).slice(0,8).map(a => newsCardHTML(a)).join('');
  } catch {
    recentCont.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📡</div><div class="empty-state-title">Connexion requise</div><div class="empty-state-sub">Les actualités nécessitent une connexion internet</div></div>';
    seasonCont.innerHTML = '';
  }
}

function newsCardHTML(a) {
  const imgEl = a.images?.jpg?.large_image_url
    ? `<img class="news-card-img" src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'news-card-img-placeholder\\'>📺</div>'">`
    : `<div class="news-card-img-placeholder">📺</div>`;
  return `<div class="news-card">
    ${imgEl}
    <div class="news-card-body">
      <div class="news-card-title">${a.title}</div>
      <div class="news-card-meta">${a.episodes||'?'} éps · ${a.year||a.aired?.prop?.from?.year||'?'} · ${a.genres?.map(g=>g.name).slice(0,2).join(', ')||'Anime'} · ⭐ ${a.score||'N/A'}</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════
//  UPCOMING PAGE
// ════════════════════════════════════════════
function renderUpcoming() {
  const cont = document.getElementById('upcomingContainer');
  const watching = DB.animes.filter(a => a.category === 'watching');
  if (!watching.length) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-title">Aucun anime en cours</div><div class="empty-state-sub">Ajoutez des animes en cours pour voir leurs prochains épisodes</div></div>`;
    return;
  }
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  cont.innerHTML = watching.map((a, i) => {
    const nextEp = (a.episodesWatched || 0) + 1;
    const baseDate = new Date();
    baseDate.setDate(baseDate.getDate() + (i % 7) + 1);
    const imgEl = a.image
      ? `<img class="upcoming-poster" src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'upcoming-poster-placeholder\\'>📺</div>'">`
      : `<div class="upcoming-poster-placeholder">📺</div>`;
    return `<div class="upcoming-card">
      ${imgEl}
      <div class="upcoming-info">
        <div class="upcoming-title">${a.title}</div>
        <div class="upcoming-ep">Épisode ${nextEp} ${a.totalEpisodes?'/ '+a.totalEpisodes:''}</div>
      </div>
      <div class="upcoming-date">
        <div class="upcoming-date-num">${baseDate.getDate()}</div>
        <div class="upcoming-date-str">${months[baseDate.getMonth()]}</div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════
//  PROFILE PAGE
// ════════════════════════════════════════════
function formatTime(minutes) {
  if (minutes < 60) return `${minutes} min`;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (h < 24) return m > 0 ? `${h}h ${m}min` : `${h}h`;
  const d = Math.floor(h / 24);
  const rh = h % 24;
  return rh > 0 ? `${d}j ${rh}h` : `${d}j`;
}

function renderProfile() {
  const animes = DB.animes;
  const watching = animes.filter(a => a.category==='watching').length;
  const completed = animes.filter(a => a.category==='completed').length;
  const plan = animes.filter(a => a.category==='plan').length;
  const totalEpsWatched = animes.reduce((s,a) => s + (a.episodesWatched||0), 0);
  const totalMinutes = animes.reduce((s,a) => s + ((a.episodesWatched||0)*(a.epDuration||24)), 0);

  // Weekly & monthly
  const now = new Date();
  const weekAgo = new Date(now - 7*24*3600*1000);
  const monthAgo = new Date(now - 30*24*3600*1000);
  // We approximate: last modified animes contribute some time
  const weekMin = animes.filter(a => a.lastWatched && new Date(a.lastWatched) > weekAgo)
    .reduce((s,a) => s + Math.min((a.episodesWatched||0)*(a.epDuration||24), (a.epDuration||24)*5), 0);
  const monthMin = animes.filter(a => a.lastWatched && new Date(a.lastWatched) > monthAgo)
    .reduce((s,a) => s + Math.min((a.episodesWatched||0)*(a.epDuration||24), (a.epDuration||24)*20), 0);

  // Most advanced
  const mostAdvanced = animes.reduce((best, a) => {
    if (!a.totalEpisodes) return best;
    const pct = (a.episodesWatched||0)/a.totalEpisodes;
    return (!best || pct > (best.episodesWatched||0)/best.totalEpisodes) ? a : best;
  }, null);

  const lastWatched = animes.filter(a=>a.lastWatched).sort((a,b)=>new Date(b.lastWatched)-new Date(a.lastWatched))[0];

  // Joined date
  const joinedDate = new Date(localStorage.getItem(JOINED_KEY) || new Date());
  const joinedStr = joinedDate.toLocaleDateString('fr-FR', { year:'numeric', month:'long' });
  document.getElementById('profileSince').textContent = `Membre depuis ${joinedStr}`;

  // Stats grid
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card accent"><div class="stat-value">${animes.length}</div><div class="stat-label">Total animés</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${watching}</div><div class="stat-label">En cours</div></div>
    <div class="stat-card green"><div class="stat-value">${completed}</div><div class="stat-label">Terminés</div></div>
    <div class="stat-card amber"><div class="stat-value">${plan}</div><div class="stat-label">En attente</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--text-primary)">${totalEpsWatched}</div><div class="stat-label">Épisodes vus</div></div>
    <div class="stat-card red"><div class="stat-value">${formatTime(totalMinutes)}</div><div class="stat-label">Temps total</div></div>`;

  // Time stats
  document.getElementById('timeStats').innerHTML = `
    <div class="wide-stat"><span class="wide-stat-label">⏱ Cette semaine</span><span class="wide-stat-value">${formatTime(weekMin)}</span></div>
    <div class="wide-stat"><span class="wide-stat-label">📅 Ce mois</span><span class="wide-stat-value">${formatTime(monthMin)}</span></div>
    <div class="wide-stat"><span class="wide-stat-label">📊 Moyenne / épisode</span><span class="wide-stat-value">${animes.length ? Math.round(animes.reduce((s,a)=>s+(a.epDuration||24),0)/animes.length) : 24} min</span></div>`;

  // Recent activity
  let recentHTML = '';
  if (mostAdvanced) {
    const pct = Math.round(((mostAdvanced.episodesWatched||0)/mostAdvanced.totalEpisodes)*100);
    const imgEl = mostAdvanced.image ? `<img src="${mostAdvanced.image}" alt="${mostAdvanced.title}" onerror="this.parentNode.innerHTML='<div class=\\'recent-anime-placeholder\\'>📺</div>'">` : `<div class="recent-anime-placeholder">📺</div>`;
    recentHTML += `<div class="recent-anime">${imgEl}<div><div class="recent-label">Le plus avancé</div><div style="font-size:14px;font-weight:600">${mostAdvanced.title}</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">${mostAdvanced.episodesWatched||0}/${mostAdvanced.totalEpisodes} éps · ${pct}%</div></div></div>`;
  }
  if (lastWatched) {
    const relTime = timeSince(lastWatched.lastWatched);
    const imgEl2 = lastWatched.image ? `<img src="${lastWatched.image}" alt="${lastWatched.title}" onerror="this.parentNode.innerHTML='<div class=\\'recent-anime-placeholder\\'>📺</div>'">` : `<div class="recent-anime-placeholder">📺</div>`;
    recentHTML += `<div class="recent-anime">${imgEl2}<div><div class="recent-label" style="color:var(--accent-green)">Dernier vu</div><div style="font-size:14px;font-weight:600">${lastWatched.title}</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">Épisode ${lastWatched.episodesWatched||0} · ${relTime}</div></div></div>`;
  }
  if (!recentHTML) recentHTML = `<div class="empty-state"><div class="empty-state-icon">🎌</div><div class="empty-state-title">Commencez à suivre des animes</div></div>`;
  document.getElementById('recentActivity').innerHTML = recentHTML;
}

function timeSince(iso) {
  const diff = (new Date() - new Date(iso)) / 1000;
  if (diff < 60) return 'il y a quelques secondes';
  if (diff < 3600) return `il y a ${Math.floor(diff/60)} min`;
  if (diff < 86400) return `il y a ${Math.floor(diff/3600)}h`;
  return `il y a ${Math.floor(diff/86400)} j`;
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
let toastTimeout;
function showToast(msg, type='ok') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  clearTimeout(toastTimeout);
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-dot ${type!=='ok'?type:''}"></div>${msg}`;
  document.body.appendChild(t);
  toastTimeout = setTimeout(() => t.remove(), 2100);
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
renderLibrary(currentCat);

// SW Registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
