<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeinkraftAI — Assistant Minecraft IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Ambient -->
<div class="bg"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<!-- App Shell -->
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="side-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" width="24" height="24"><rect x="2" y="2" width="9" height="9" rx="1.5" fill="#818cf8"/><rect x="13" y="2" width="9" height="9" rx="1.5" fill="#34d399"/><rect x="2" y="13" width="9" height="9" rx="1.5" fill="#f59e0b"/><rect x="13" y="13" width="9" height="9" rx="1.5" fill="#f43f5e"/></svg>
      </div>
      <span>Meinkraft<span class="accent">AI</span></span>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Nouvelle conversation
    </button>
    <div class="side-history" id="history"></div>
    <div class="side-footer">
      <div class="side-stats">
        <span>900+ blocs</span>
        <span>•</span>
        <span>1400+ items</span>
        <span>•</span>
        <span>52 mobs</span>
      </div>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="main">
    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" width="20" height="20" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="top-title" id="topTitle">Nouvelle conversation</div>
      <div class="top-right">
        <button class="icon-btn" onclick="showDB()" title="Base de données">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        </button>
      </div>
    </header>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 48 48" width="64" height="64"><rect x="4" y="4" width="18" height="18" rx="3" fill="#818cf8" opacity=".8"/><rect x="26" y="4" width="18" height="18" rx="3" fill="#34d399" opacity=".8"/><rect x="4" y="26" width="18" height="18" rx="3" fill="#f59e0b" opacity=".8"/><rect x="26" y="26" width="18" height="18" rx="3" fill="#f43f5e" opacity=".8"/></svg>
        </div>
        <h1>Meinkraft<span class="accent">AI</span></h1>
        <p>Décris ce que tu veux construire dans Minecraft.<br>L'IA réfléchit, génère une maquette 3D, puis crée un tutoriel complet.</p>
        <div class="welcome-examples" id="examples">
          <button class="example-btn" onclick="useExample(this)">Un McDonald's réaliste</button>
          <button class="example-btn" onclick="useExample(this)">Un château médiéval avec douves</button>
          <button class="example-btn" onclick="useExample(this)">Une base secrète souterraine</button>
          <button class="example-btn" onclick="useExample(this)">Un bateau pirate détaillé</button>
          <button class="example-btn" onclick="useExample(this)">Une maison moderne avec piscine</button>
          <button class="example-btn" onclick="useExample(this)">Un gratte-ciel futuriste</button>
        </div>
      </div>

      <!-- Messages container -->
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="Décris ce que tu veux construire..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <div class="input-hint">L'IA analyse ta demande et génère une structure complète</div>
    </div>
  </main>
</div>

<!-- Database Modal -->
<div class="modal-overlay" id="dbModal" onclick="if(event.target===this)closeDB()">
  <div class="modal">
    <div class="modal-header">
      <h2>Base de données Minecraft</h2>
      <button class="icon-btn" onclick="closeDB()">✕</button>
    </div>
    <div class="modal-search">
      <input type="text" class="input" id="dbSearch" placeholder="Rechercher un bloc, item, mob..." oninput="searchDB(this.value)">
    </div>
    <div class="modal-tabs">
      <button class="mtab active" data-t="blocks" onclick="dbTab('blocks')">🧱 Blocs</button>
      <button class="mtab" data-t="items" onclick="dbTab('items')">⚔️ Items</button>
      <button class="mtab" data-t="mobs" onclick="dbTab('mobs')">👾 Mobs</button>
      <button class="mtab" data-t="cmds" onclick="dbTab('cmds')">⌨️ Commandes</button>
    </div>
    <div class="modal-grid" id="dbGrid"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="renderer.js"></script>
<script src="brain.js"></script>
</body>
</html>
